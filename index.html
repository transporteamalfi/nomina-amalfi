// ═══════════════════════════════════════════════════════════════════════════
//  CALCULADORA BONIFICACIÓN ANUAL — Art. 223 Código de Trabajo RD
// ═══════════════════════════════════════════════════════════════════════════
function Bonificacion({ employees }) {
  const anio = new Date().getFullYear() - 1; // año fiscal previo
  const [utilidades, setUtilidades] = useState('');
  const [fechaCorte, setFechaCorte] = useState(String(anio) + '-12-31');
  const [calculado, setCalculado]   = useState(false);
  const [resultados, setResultados] = useState([]);
  const [totalBruto, setTotalBruto] = useState(0);
  const [totalPagar, setTotalPagar] = useState(0);
  const [factor, setFactor]         = useState(1);
  const [pdfLoading, setPdfLoading] = useState(false);

  const rd = n => 'RD$' + Number(n).toLocaleString('es-DO',{minimumFractionDigits:2,maximumFractionDigits:2});

  function calcularAntiguedad(emp) {
    // Use fechaIngreso from employee record or fallback
    if (!emp.startDate && !emp.fechaIngreso) return { years: 0, str: 'Sin fecha' };
    const raw = emp.startDate || emp.fechaIngreso || '';
    // Handle DD/MM/AAAA or YYYY-MM-DD
    let ini;
    if (raw.includes('/')) {
      const [d,m,y] = raw.split('/');
      ini = new Date(`${y}-${m}-${d}T12:00:00`);
    } else {
      ini = new Date(raw + 'T12:00:00');
    }
    const corte = new Date(fechaCorte + 'T12:00:00');
    const diffMs = corte - ini;
    if (diffMs < 0) return { years: 0, str: 'Fecha inválida' };
    const years = diffMs / (365.25 * 86400000);
    const yrs   = Math.floor(years);
    const mths  = Math.floor((years - yrs) * 12);
    let str = yrs > 0 ? yrs + ' año' + (yrs>1?'s':'') : '';
    if (mths > 0) str += (str?', ':'') + mths + ' mes' + (mths>1?'es':'');
    if (!str) str = 'Menos de 1 mes';
    return { years, str, ini };
  }

  function calcular() {
    const util = parseFloat(utilidades.replace(/,/g,'')) || 0;
    const pool = util * 0.10; // 10% de utilidades netas

    const rows = employees.map(emp => {
      const { years, str } = calcularAntiguedad(emp);
      const sal   = parseFloat(emp.salary) || 0;
      const diario = sal / 23.83;
      const dias   = years >= 3 ? 60 : years >= (1/12) ? 45 : 45 * (years * 12); // proporcional si <1 mes
      // Si menos de 1 año pero más de 1 mes, proporcional
      let diasEfectivos = dias;
      let proporcional  = false;
      if (years > 0 && years < 1) {
        diasEfectivos = (sal * years * 12 / 12) / 23.83 * 45 / diario;
        // Más simple: (salario mensual × meses/12) / 23.83 × 45
        const meses = years * 12;
        diasEfectivos = ((sal * meses / 12) / 23.83) * 45 / diario;
        // Simplificado: salario proporcional diario × 45
        diasEfectivos = 45 * (meses / 12);
        proporcional = true;
      }
      const bonifBruta = diario * (years >= 3 ? 60 : diasEfectivos <= 45 ? diasEfectivos : 45);
      return { emp, years, str, sal, diario, bonifBruta, proporcional,
               diasCorresponden: years >= 3 ? 60 : Math.min(45, diasEfectivos) };
    });

    const sumaBruta = rows.reduce((s, r) => s + r.bonifBruta, 0);
    const f = pool > 0 && sumaBruta > pool ? pool / sumaBruta : 1;

    const final = rows.map(r => ({ ...r, bonifFinal: r.bonifBruta * f }));
    const totalP = final.reduce((s,r) => s + r.bonifFinal, 0);

    setResultados(final);
    setTotalBruto(sumaBruta);
    setTotalPagar(totalP);
    setFactor(f);
    setCalculado(true);
  }

  function descargarPDF() {
    setPdfLoading(true);
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit:'mm', format:'a4' });
      const W = 210, M = 14;
      let y = 18;

      try { doc.addImage(LOGO_TEA,'PNG', W/2-12, y, 24,12); y+=16; } catch(e){ y+=4; }

      doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(0,34,102);
      doc.text('TRANSPORTE EMPRESARIAL AMALFI', W/2, y, {align:'center'}); y += 6;
      doc.setFontSize(11); doc.setFont('helvetica','normal'); doc.setTextColor(60,60,60);
      doc.text('Planilla de Bonificación Anual de Ley', W/2, y, {align:'center'}); y += 5;
      doc.setFontSize(9);
      doc.text(`Año Fiscal ${anio}  ·  Art. 223 Código de Trabajo  ·  10% de Utilidades Netas`, W/2, y, {align:'center'}); y += 4;
      doc.text(`Utilidades Netas: ${rd(parseFloat(utilidades.replace(/,/g,''))||0)}  ·  Pool a distribuir: ${rd((parseFloat(utilidades.replace(/,/g,''))||0)*0.1)}  ·  Factor de prorrateo: ${factor.toFixed(4)}`, W/2, y, {align:'center'}); y += 8;

      doc.setDrawColor(0,34,102); doc.setLineWidth(0.6);
      doc.line(M, y, W-M, y); y += 6;

      // Headers
      doc.setFillColor(0,34,102); doc.rect(M, y-4, W-2*M, 8,'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(255,255,255);
      doc.text('#',    M+3, y);
      doc.text('Empleado',     M+9,  y);
      doc.text('Antigüedad',   M+79, y);
      doc.text('Sal. Mensual', M+108,y);
      doc.text('Días',         M+133,y);
      doc.text('Bonif. Bruta', M+143,y);
      doc.text('A PAGAR',      M+165,y);
      y += 6;

      doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(0,0,0);
      const sorted = [...resultados].sort((a,b)=>a.emp.name.localeCompare(b.emp.name));
      sorted.forEach((r,i) => {
        if (i%2===0){doc.setFillColor(245,248,255);doc.rect(M,y-3.5,W-2*M,7,'F');}
        doc.text(String(i+1), M+4, y, {align:'right'});
        const nm = r.emp.name.length>32?r.emp.name.substring(0,30)+'…':r.emp.name;
        doc.text(nm,          M+9,  y);
        doc.text(r.str,       M+79, y);
        doc.text(rd(r.sal),   M+108,y);
        doc.text(r.diasCorresponden.toFixed(1), M+136, y, {align:'right'});
        doc.text(rd(r.bonifBruta), M+155, y, {align:'right'});
        doc.setFont('helvetica','bold'); doc.setTextColor(0,34,102);
        doc.text(rd(r.bonifFinal), M+182, y, {align:'right'});
        doc.setFont('helvetica','normal'); doc.setTextColor(0,0,0);
        y += 7;
        if (y > 268){ doc.addPage(); y = 20; }
      });

      y += 2;
      doc.setFillColor(0,34,102); doc.rect(M, y-4, W-2*M, 9,'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(255,255,255);
      doc.text('TOTAL A PAGAR POR BONIFICACIÓN ANUAL:', M+9, y);
      doc.text(rd(totalPagar), M+182, y, {align:'right'});
      y += 14;

      if (factor < 1) {
        doc.setFontSize(8); doc.setTextColor(180,60,0);
        doc.text(`* Factor de prorrateo aplicado: ${factor.toFixed(4)} (el 10% de utilidades es menor que la suma de bonificaciones individuales)`, M, y);
        y += 8;
      }

      doc.line(M, y, M+60, y); doc.line(W-M-60, y, W-M, y); y += 5;
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(0,0,0);
      doc.text('Gerencia / Administración', M+5, y);
      doc.text('Contabilidad', W-M-45, y);
      doc.setFontSize(7); doc.setTextColor(130,130,130);
      doc.text(`RNC: 131-07998-9  ·  Generado: ${new Date().toLocaleDateString('es-DO')}  ·  Plazo límite de pago: 120 días tras cierre fiscal`, W/2, 288, {align:'center'});

      doc.save(`Bonificacion_${anio}_Amalfi.pdf`);
    } finally { setPdfLoading(false); }
  }

  const sorted = [...resultados].sort((a,b)=>a.emp.name.localeCompare(b.emp.name));

  return (
    <div style={{maxWidth:920,margin:'0 auto',padding:24}}>
      <h2 style={{fontFamily:'Montserrat',color:'#003366',marginBottom:4}}>🏆 Bonificación Anual de Ley</h2>
      <p style={{fontSize:13,color:'#5A7090',marginBottom:20}}>
        Art. 223 Código de Trabajo · 10% de utilidades netas · Plazo: 90-120 días tras cierre fiscal (cierre dic → pagar antes 30 abril)
      </p>

      {/* Formulario */}
      <div className="card" style={{marginBottom:20}}>
        <div style={{fontWeight:700,color:'#003366',marginBottom:14}}>⚙️ Parámetros del Cálculo</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <div>
            <label style={{fontSize:12,fontWeight:700,color:'#5A7090',display:'block',marginBottom:4}}>
              Utilidades Netas del Año (RD$) *
            </label>
            <input type="text" value={utilidades} onChange={e=>setUtilidades(e.target.value)}
              placeholder="Ej: 1,000,000.00"
              style={{width:'100%',padding:'10px 12px',border:'1.5px solid #D0DCF0',borderRadius:8,fontSize:14}}/>
            <div style={{fontSize:11,color:'#8090A0',marginTop:3}}>
              Pool a distribuir: <strong>{utilidades ? rd((parseFloat(utilidades.replace(/,/g,''))||0)*0.1) : 'RD$0.00'}</strong> (10%)
            </div>
          </div>
          <div>
            <label style={{fontSize:12,fontWeight:700,color:'#5A7090',display:'block',marginBottom:4}}>
              Fecha de Cierre Fiscal *
            </label>
            <input type="date" value={fechaCorte} onChange={e=>setFechaCorte(e.target.value)}
              style={{width:'100%',padding:'10px 12px',border:'1.5px solid #D0DCF0',borderRadius:8,fontSize:14}}/>
            <div style={{fontSize:11,color:'#8090A0',marginTop:3}}>Para calcular antigüedad de cada empleado</div>
          </div>
        </div>

        <div style={{background:'#F0F6FF',borderRadius:8,padding:'10px 14px',marginTop:14,fontSize:12,color:'#3D5A80',lineHeight:1.7}}>
          <strong>Reglas (Art. 223):</strong> &nbsp;
          Menos de 3 años → hasta <strong>45 días</strong> de salario ordinario &nbsp;·&nbsp;
          3 años o más → hasta <strong>60 días</strong> de salario ordinario &nbsp;·&nbsp;
          Si el 10% no alcanza, se aplica <strong>factor de prorrateo</strong>
        </div>

        <button onClick={calcular} disabled={!utilidades || !fechaCorte}
          style={{marginTop:14,width:'100%',padding:13,
            background:(!utilidades||!fechaCorte)?'#A0B0C8':'#003366',
            color:'white',border:'none',borderRadius:10,fontSize:15,fontWeight:700,cursor:'pointer'}}>
          🏆 Calcular Bonificación para todos los Empleados
        </button>
      </div>

      {/* Resultados */}
      {calculado && (
        <>
          {/* Resumen */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:20}}>
            {[
              ['💰 Pool Disponible (10%)', rd((parseFloat(utilidades.replace(/,/g,''))||0)*0.1), '#003366'],
              ['📊 Suma Bonif. Brutas',    rd(totalBruto), '#1A6B3A'],
              ['✅ Total a Pagar',          rd(totalPagar), factor<1?'#DC2626':'#003366'],
            ].map(([label,val,color])=>(
              <div key={label} className="card" style={{textAlign:'center',padding:'16px 12px'}}>
                <div style={{fontSize:12,color:'#5A7090',marginBottom:6}}>{label}</div>
                <div style={{fontSize:20,fontWeight:800,color}}>{val}</div>
              </div>
            ))}
          </div>

          {factor < 1 && (
            <div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:10,
              padding:'12px 16px',marginBottom:16,fontSize:13,color:'#DC2626'}}>
              ⚠️ <strong>Factor de prorrateo aplicado: {factor.toFixed(4)}</strong> — La suma de bonificaciones individuales ({rd(totalBruto)}) supera el 10% disponible ({rd((parseFloat(utilidades.replace(/,/g,''))||0)*0.1)}). Los montos se ajustaron proporcionalmente.
            </div>
          )}

          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
            <button onClick={descargarPDF} disabled={pdfLoading}
              style={{background:'#003366',color:'white',border:'none',borderRadius:10,
                padding:'10px 20px',fontWeight:700,cursor:'pointer',fontSize:13}}>
              {pdfLoading ? '⏳ Generando...' : '⬇️ Descargar Planilla PDF'}
            </button>
          </div>

          {/* Tabla */}
          <div className="card" style={{padding:0,overflow:'hidden'}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead>
                <tr style={{background:'#003366',color:'white'}}>
                  {['Empleado','Antigüedad','Días','Sal. Mensual','Bonif. Bruta','A PAGAR'].map(h=>(
                    <th key={h} style={{padding:'10px 12px',textAlign:h==='Empleado'?'left':'right',
                      fontSize:12,fontWeight:700,color:h==='A PAGAR'?'#FFD700':'white'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {sorted.map((r,i)=>(
                  <tr key={r.emp.id} style={{background:i%2===0?'white':'#F8FAFF',borderBottom:'1px solid #E8EEF8'}}>
                    <td style={{padding:'10px 12px',fontSize:13,fontWeight:600,color:'#1A2D4A'}}>
                      {r.emp.name}
                      {r.proporcional && <span style={{fontSize:10,color:'#8090A0',marginLeft:6}}>(proporcional)</span>}
                    </td>
                    <td style={{padding:'10px 12px',textAlign:'right',fontSize:12,color:'#5A7090'}}>{r.str}</td>
                    <td style={{padding:'10px 12px',textAlign:'right',fontSize:13,fontWeight:700,
                      color:r.diasCorresponden>=60?'#1A6B3A':'#003366'}}>
                      {r.diasCorresponden.toFixed(1)}
                    </td>
                    <td style={{padding:'10px 12px',textAlign:'right',fontSize:13,color:'#5A7090'}}>{rd(r.sal)}</td>
                    <td style={{padding:'10px 12px',textAlign:'right',fontSize:13,color:'#8090A0'}}>{rd(r.bonifBruta)}</td>
                    <td style={{padding:'10px 12px',textAlign:'right',fontSize:14,fontWeight:800,color:'#003366'}}>{rd(r.bonifFinal)}</td>
                  </tr>
                ))}
              </tbody>
              <tfoot>
                <tr style={{background:'#003366',color:'white'}}>
                  <td colSpan={4} style={{padding:'12px',fontWeight:800,fontSize:13}}>TOTAL ({employees.length} empleados)</td>
                  <td style={{padding:'12px',textAlign:'right',fontSize:13,color:'#A0C4E8'}}>{rd(totalBruto)}</td>
                  <td style={{padding:'12px',textAlign:'right',fontSize:15,fontWeight:800,color:'#FFD700'}}>{rd(totalPagar)}</td>
                </tr>
              </tfoot>
            </table>
          </div>

          <div style={{marginTop:12,fontSize:11,color:'#8090A0',textAlign:'center'}}>
            ⚠️ La bonificación está sujeta a retención de ISR si aplica, e INFOTEP (0.5%) · No incluye horas extras ni bonos anteriores · No es base para cálculo de cesantía ni preaviso
          </div>
        </>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  CALCULADORA VACACIONES — Art. 177-180 Código de Trabajo RD
// ═══════════════════════════════════════════════════════════════════════════
function Vacaciones({ employees }) {
  const [fechaRef, setFechaRef] = useState(new Date().toISOString().substring(0,10));
  const [calculado, setCalculado] = useState(false);
  const [resultados, setResultados] = useState([]);
  const [editDias, setEditDias] = useState({}); // empId -> dias override
  const [pdfLoading, setPdfLoading] = useState(false);

  const rd = n => 'RD$' + Number(n).toLocaleString('es-DO',{minimumFractionDigits:2,maximumFractionDigits:2});

  function getAntiguedad(emp) {
    const raw = emp.startDate || emp.fechaIngreso || '';
    if (!raw) return { months: 0, years: 0, str: 'Sin fecha de ingreso' };
    let ini;
    if (raw.includes('/')) { const [d,m,y]=raw.split('/'); ini=new Date(`${y}-${m}-${d}T12:00:00`); }
    else ini = new Date(raw + 'T12:00:00');
    const ref = new Date(fechaRef + 'T12:00:00');
    const diffMs = ref - ini;
    if (diffMs < 0) return { months:0, years:0, str:'Fecha inválida' };
    const totalMonths = diffMs / (30.4375 * 86400000);
    const years = totalMonths / 12;
    const yrs  = Math.floor(years);
    const mths = Math.floor(totalMonths - yrs*12);
    let str = yrs>0 ? yrs+' año'+(yrs>1?'s':'') : '';
    if (mths>0) str += (str?', ':'')+mths+' mes'+(mths>1?'es':'');
    if (!str) str = Math.floor(totalMonths)+' mes'+(Math.floor(totalMonths)>1?'es':'');
    return { months: totalMonths, years, str };
  }

  function getDiasVac(months) {
    // Art. 180 proporcional (menos de 1 año pero más de 5 meses)
    if (months < 5) return 0;
    if (months < 6)  return 6;
    if (months < 7)  return 7;
    if (months < 8)  return 8;
    if (months < 9)  return 9;
    if (months < 10) return 10;
    if (months < 11) return 11;
    if (months < 12) return 12;
    // Art. 177 — 1 año o más
    if (months < 60) return 14;  // menos de 5 años
    return 18;                    // 5 años o más
  }

  function getLeyLabel(months) {
    if (months < 5)  return 'Sin derecho (<5 meses)';
    if (months < 12) return `Proporcional (Art. 180) — ${getDiasVac(months)} días`;
    if (months < 60) return '1-5 años (Art. 177) — 14 días';
    return '+5 años (Art. 177) — 18 días';
  }

  function calcular() {
    const rows = employees.map(emp => {
      const { months, years, str } = getAntiguedad(emp);
      const dias  = getDiasVac(months);
      const sal   = parseFloat(emp.salary) || 0;
      const diario = sal / 23.83;
      const monto = diario * dias;
      return { emp, months, years, str, dias, sal, diario, monto };
    });
    setResultados(rows);
    setEditDias({});
    setCalculado(true);
  }

  function getMonto(r) {
    const dias = editDias[String(r.emp.id)] !== undefined ? parseFloat(editDias[String(r.emp.id)])||0 : r.dias;
    return r.diario * dias;
  }
  function getDiasEfectivos(r) {
    return editDias[String(r.emp.id)] !== undefined ? parseFloat(editDias[String(r.emp.id)])||0 : r.dias;
  }

  const totalVac = resultados.reduce((s,r) => s + getMonto(r), 0);
  const sorted   = [...resultados].sort((a,b)=>a.emp.name.localeCompare(b.emp.name));

  function descargarPDF() {
    setPdfLoading(true);
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit:'mm', format:'a4' });
      const W=210, M=14; let y=18;

      try { doc.addImage(LOGO_TEA,'PNG',W/2-12,y,24,12); y+=16; } catch(e){ y+=4; }
      doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(0,34,102);
      doc.text('TRANSPORTE EMPRESARIAL AMALFI', W/2, y, {align:'center'}); y+=6;
      doc.setFontSize(11); doc.setFont('helvetica','normal'); doc.setTextColor(60,60,60);
      doc.text('Planilla de Vacaciones Laborales', W/2, y, {align:'center'}); y+=5;
      doc.setFontSize(9);
      doc.text(`Art. 177-180 del Código de Trabajo  ·  Fecha de referencia: ${new Date(fechaRef+'T12:00:00').toLocaleDateString('es-DO',{day:'2-digit',month:'2-digit',year:'numeric'})}`, W/2, y, {align:'center'}); y+=8;
      doc.setDrawColor(0,34,102); doc.setLineWidth(0.6);
      doc.line(M,y,W-M,y); y+=6;

      doc.setFillColor(0,34,102); doc.rect(M,y-4,W-2*M,8,'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(255,255,255);
      doc.text('#',M+3,y); doc.text('Empleado',M+9,y);
      doc.text('Antigüedad',M+82,y); doc.text('Días',M+120,y);
      doc.text('Sal. Mensual',M+132,y); doc.text('Sal. Diario',M+155,y);
      doc.text('A PAGAR',M+175,y); y+=6;

      doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(0,0,0);
      sorted.forEach((r,i)=>{
        const dias  = getDiasEfectivos(r);
        const monto = getMonto(r);
        if(i%2===0){doc.setFillColor(245,248,255);doc.rect(M,y-3.5,W-2*M,7,'F');}
        doc.text(String(i+1),M+4,y,{align:'right'});
        const nm=r.emp.name.length>34?r.emp.name.substring(0,32)+'…':r.emp.name;
        doc.text(nm,M+9,y);
        doc.text(r.str,M+82,y);
        doc.text(String(dias),M+124,y,{align:'right'});
        doc.text(rd(r.sal),M+151,y,{align:'right'});
        doc.text(rd(r.diario),M+172,y,{align:'right'});
        doc.setFont('helvetica','bold'); doc.setTextColor(0,34,102);
        doc.text(rd(monto),M+193,y,{align:'right'});
        doc.setFont('helvetica','normal'); doc.setTextColor(0,0,0);
        y+=7;
        if(y>268){doc.addPage();y=20;}
      });

      y+=2;
      doc.setFillColor(0,34,102); doc.rect(M,y-4,W-2*M,9,'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(255,255,255);
      doc.text('TOTAL A PAGAR POR VACACIONES:',M+9,y);
      doc.text(rd(totalVac),M+193,y,{align:'right'});
      y+=14;

      doc.line(M,y,M+60,y); doc.line(W-M-60,y,W-M,y); y+=5;
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(0,0,0);
      doc.text('Gerencia / Administración',M+5,y);
      doc.text('Contabilidad',W-M-45,y);
      doc.setFontSize(7); doc.setTextColor(130,130,130);
      doc.text(`RNC: 131-07998-9  ·  Generado: ${new Date().toLocaleDateString('es-DO')}  ·  El pago debe realizarse el día ANTERIOR al inicio del descanso (Art. 181)`,W/2,288,{align:'center'});
      doc.save(`Vacaciones_${fechaRef.substring(0,4)}_Amalfi.pdf`);
    } finally { setPdfLoading(false); }
  }

  const ESCALA = [
    ['Menos de 5 meses','Sin derecho'],['5-6 meses','6 días'],['6-7 meses','7 días'],
    ['7-8 meses','8 días'],['8-9 meses','9 días'],['9-10 meses','10 días'],
    ['10-11 meses','11 días'],['11-12 meses','12 días'],
    ['1 a 5 años','14 días'],['Más de 5 años','18 días'],
  ];

  return (
    <div style={{maxWidth:960,margin:'0 auto',padding:24}}>
      <h2 style={{fontFamily:'Montserrat',color:'#003366',marginBottom:4}}>🏖️ Calculadora de Vacaciones</h2>
      <p style={{fontSize:13,color:'#5A7090',marginBottom:20}}>
        Art. 177-180 Código de Trabajo · El pago debe efectuarse el día ANTERIOR al inicio del descanso (Art. 181)
      </p>

      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:20,marginBottom:20}}>
        {/* Formulario */}
        <div className="card">
          <div style={{fontWeight:700,color:'#003366',marginBottom:14}}>⚙️ Parámetros</div>
          <label style={{fontSize:12,fontWeight:700,color:'#5A7090',display:'block',marginBottom:4}}>
            Fecha de referencia (para calcular antigüedad)
          </label>
          <input type="date" value={fechaRef} onChange={e=>setFechaRef(e.target.value)}
            style={{width:'100%',padding:'10px 12px',border:'1.5px solid #D0DCF0',borderRadius:8,fontSize:14,marginBottom:14}}/>

          <div style={{background:'#F0F6FF',borderRadius:8,padding:'10px 14px',fontSize:12,color:'#3D5A80',lineHeight:1.7,marginBottom:14}}>
            💡 Puedes ajustar los días de cada empleado manualmente en la tabla si va a tomar vacaciones parciales.
          </div>

          <button onClick={calcular}
            style={{width:'100%',padding:13,background:'#003366',color:'white',
              border:'none',borderRadius:10,fontSize:15,fontWeight:700,cursor:'pointer'}}>
            🏖️ Calcular Vacaciones para todos
          </button>
        </div>

        {/* Escala */}
        <div className="card" style={{padding:'16px'}}>
          <div style={{fontWeight:700,color:'#003366',marginBottom:10,fontSize:13}}>📋 Escala Legal (Art. 177-180)</div>
          {ESCALA.map(([tiempo,dias])=>(
            <div key={tiempo} style={{display:'flex',justifyContent:'space-between',
              padding:'5px 0',borderBottom:'1px solid #F0F4FA',fontSize:12}}>
              <span style={{color:'#5A7090'}}>{tiempo}</span>
              <span style={{fontWeight:700,color:dias==='Sin derecho'?'#DC2626':dias==='18 días'?'#1A6B3A':'#003366'}}>{dias}</span>
            </div>
          ))}
        </div>
      </div>

      {calculado && (
        <>
          {/* Resumen */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:16}}>
            {[
              ['👥 Empleados con derecho', sorted.filter(r=>r.dias>0).length + ' de ' + employees.length, '#003366'],
              ['📅 Sin derecho aún',       sorted.filter(r=>r.dias===0).length + ' empleados', '#DC2626'],
              ['💰 Total a Pagar',         rd(totalVac), '#1A6B3A'],
            ].map(([label,val,color])=>(
              <div key={label} className="card" style={{textAlign:'center',padding:'14px 10px'}}>
                <div style={{fontSize:12,color:'#5A7090',marginBottom:4}}>{label}</div>
                <div style={{fontSize:18,fontWeight:800,color}}>{val}</div>
              </div>
            ))}
          </div>

          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
            <button onClick={descargarPDF} disabled={pdfLoading}
              style={{background:'#003366',color:'white',border:'none',borderRadius:10,
                padding:'10px 20px',fontWeight:700,cursor:'pointer',fontSize:13}}>
              {pdfLoading?'⏳ Generando...':'⬇️ Descargar Planilla PDF'}
            </button>
          </div>

          <div className="card" style={{padding:0,overflow:'hidden'}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead>
                <tr style={{background:'#003366',color:'white'}}>
                  <th style={{padding:'10px 12px',textAlign:'left',fontSize:12,fontWeight:700}}>Empleado</th>
                  <th style={{padding:'10px 12px',textAlign:'left',fontSize:12,fontWeight:700}}>Antigüedad</th>
                  <th style={{padding:'10px 12px',textAlign:'center',fontSize:12,fontWeight:700}}>Días</th>
                  <th style={{padding:'10px 12px',textAlign:'right',fontSize:12,fontWeight:700}}>Sal. Mensual</th>
                  <th style={{padding:'10px 12px',textAlign:'right',fontSize:12,fontWeight:700}}>Sal. Diario</th>
                  <th style={{padding:'10px 12px',textAlign:'right',fontSize:12,fontWeight:700,color:'#FFD700'}}>A PAGAR</th>
                </tr>
              </thead>
              <tbody>
                {sorted.map((r,i)=>{
                  const diasEf = getDiasEfectivos(r);
                  const monto  = getMonto(r);
                  return (
                    <tr key={r.emp.id} style={{background:i%2===0?'white':'#F8FAFF',borderBottom:'1px solid #E8EEF8',
                      opacity:r.dias===0?0.5:1}}>
                      <td style={{padding:'10px 12px',fontSize:13,fontWeight:600,color:'#1A2D4A'}}>
                        {r.emp.name}
                        <div style={{fontSize:10,color:'#8090A0',marginTop:2}}>{getLeyLabel(r.months)}</div>
                      </td>
                      <td style={{padding:'10px 12px',fontSize:12,color:'#5A7090'}}>{r.str}</td>
                      <td style={{padding:'10px 12px',textAlign:'center'}}>
                        {r.dias > 0 ? (
                          <input type="number" value={editDias[String(r.emp.id)]!==undefined?editDias[String(r.emp.id)]:r.dias}
                            min="0" max="30"
                            onChange={e=>setEditDias(prev=>({...prev,[String(r.emp.id)]:e.target.value}))}
                            style={{width:52,textAlign:'center',border:'1.5px solid #D0DCF0',borderRadius:6,
                              padding:'4px 6px',fontSize:13,fontWeight:700,color:'#003366'}}/>
                        ) : (
                          <span style={{color:'#DC2626',fontSize:12}}>0</span>
                        )}
                      </td>
                      <td style={{padding:'10px 12px',textAlign:'right',fontSize:13,color:'#5A7090'}}>{rd(r.sal)}</td>
                      <td style={{padding:'10px 12px',textAlign:'right',fontSize:13,color:'#5A7090'}}>{rd(r.diario)}</td>
                      <td style={{padding:'10px 12px',textAlign:'right',fontSize:14,fontWeight:800,
                        color:r.dias===0?'#A0AEC0':'#003366'}}>{rd(monto)}</td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr style={{background:'#003366',color:'white'}}>
                  <td colSpan={4} style={{padding:'12px',fontWeight:800,fontSize:13}}>TOTAL ({employees.length} empleados)</td>
                  <td style={{padding:'12px'}}></td>
                  <td style={{padding:'12px',textAlign:'right',fontSize:15,fontWeight:800,color:'#FFD700'}}>{rd(totalVac)}</td>
                </tr>
              </tfoot>
            </table>
          </div>

          <div style={{marginTop:12,fontSize:11,color:'#8090A0',textAlign:'center',lineHeight:1.8}}>
            ⚠️ Los días de vacaciones son <strong>laborables</strong> (excluye domingos y feriados) ·
            El pago debe realizarse el día ANTERIOR al inicio del descanso (Art. 181) ·
            El empleador debe llevar un libro-registro de vacaciones (Art. 186)
          </div>
        </>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  CALENDARIO LABORAL — Feriados RD 2026 + Fechas Importantes
// ══════════════════════════════════════════════════════════════════════════
//  CALENDARIO LABORAL — Compliance · TSS 2026 · Feriados
// ══════════════════════════════════════════════════════════════════════════
function Calendario() {
  const [tab, setTab] = useState('compliance');
  const hoy = new Date(); hoy.setHours(12,0,0,0);
  const diasPara = d => { const x = new Date(d); x.setHours(12,0,0,0); return Math.ceil((x-hoy)/86400000); };
  const fmtES = d => new Date(d).toLocaleDateString('es-DO',{day:'2-digit',month:'short',year:'numeric'});

  const TSS_2026 = [
    {mes:'Diciembre 2025',  limite:'2026-01-07'},
    {mes:'Enero 2026',      limite:'2026-02-04'},
    {mes:'Febrero 2026',    limite:'2026-03-04'},
    {mes:'Marzo 2026',      limite:'2026-04-06'},
    {mes:'Abril 2026',      limite:'2026-05-06'},
    {mes:'Mayo 2026',       limite:'2026-06-03'},
    {mes:'Junio 2026',      limite:'2026-07-03'},
    {mes:'Julio 2026',      limite:'2026-08-05'},
    {mes:'Agosto 2026',     limite:'2026-09-03'},
    {mes:'Septiembre 2026', limite:'2026-10-05'},
    {mes:'Octubre 2026',    limite:'2026-11-04'},
    {mes:'Noviembre 2026',  limite:'2026-12-03'},
  ];

  function buildCompliance() {
    const y=2026; const items=[];
    const add = (fecha,titulo,subtitulo,tipo,recurrente) =>
      items.push({fecha,titulo,subtitulo,tipo,recurrente,diff:diasPara(fecha)});

    // ── Ministerio de Trabajo ──
    add(`${y}-01-15`,'Cartel de Vacaciones','Publicar calendario vacaciones en instalaciones (Art. 186 CT)','dgt','Anual');
    add(`${y}-01-31`,'DGT-3 — Planilla Personal Fijo','Renovación anual (prorrogado) — portal ovi.mt.gob.do','dgt','Anual');
    for(let m=1;m<=12;m++){
      const mm=String(m).padStart(2,'0');
      add(`${y}-${mm}-05`,'DGT-4 — Cambios Personal Fijo','Incorporaciones, salidas y aumentos del mes anterior','dgt','Mensual');
      add(`${y}-${mm}-10`,'DGT-2 — Horas Extraordinarias','Reporte horas extras del mes anterior — Min. Trabajo','dgt','Mensual');
    }
    // ── TSS con fechas exactas publicadas ──
    TSS_2026.forEach(t=>add(t.limite,'TSS — AFP + SFS + SRL + INFOTEP',`Aportes ${t.mes} sin recargo · SUIR de la TSS`,'tss','Mensual'));
    // ── DGII día 10: IR-3 e IR-17 ──
    for(let m=1;m<=12;m++){
      const mm=String(m).padStart(2,'0');
      add(`${y}-${mm}-10`,'IR-3 — Retenciones Asalariados','Declaración retenciones ISR empleados — DGII','isr','Mensual');
      add(`${y}-${mm}-10`,'IR-17 — Retenciones y Retribuciones','Otras retenciones y retribuciones complementarias — DGII','isr','Mensual');
    }
    // ── DGII día 15: Formatos 606/607/608/609 ──
    for(let m=1;m<=12;m++){
      const mm=String(m).padStart(2,'0');
      add(`${y}-${mm}-15`,'Formato 606 — Compras','Reporte compras con RNC, NCF, ITBIS — DGII','dgii','Mensual');
      add(`${y}-${mm}-15`,'Formato 607 — Ventas','Reporte ventas con NCF y retenciones — DGII','dgii','Mensual');
      add(`${y}-${mm}-15`,'Formato 608 — Anulaciones','Comprobantes anulados del período — DGII','dgii','Mensual');
      add(`${y}-${mm}-15`,'Formato 609 — Pagos Exterior','Pagos a proveedores del exterior — DGII','dgii','Mensual');
    }
    // ── DGII día 20: IT-1 ITBIS ──
    for(let m=1;m<=12;m++){
      const mm=String(m).padStart(2,'0');
      add(`${y}-${mm}-20`,'IT-1 — ITBIS Mensual','Impuesto Transferencia Bienes y Servicios — DGII (día 20)','itbis','Mensual');
    }
    // ── Nómina quincenal ──
    for(let m=1;m<=12;m++){
      const mm=String(m).padStart(2,'0');
      const ult=new Date(y,m,0).getDate();
      add(`${y}-${mm}-10`,'Pago Nómina — 1ra Quincena','Pago quincenal empleados','nomina','Quincenal');
      add(`${y}-${mm}-${Math.min(25,ult)}`,'Pago Nómina — 2da Quincena','Pago quincenal empleados','nomina','Quincenal');
    }
    // ── Anuales ──
    add(`${y}-03-31`,'IR-1 — ISR Personas Físicas','Declaración jurada anual personas físicas — DGII (31 marzo)','isr','Anual');
    add(`${y}-04-30`,'IR-2 — ISR Sociedades','Declaración jurada anual personas jurídicas — DGII (120 días)','isr','Anual');
    add(`${y}-04-30`,'ACT — Activos Imponibles','Declaración activos imponibles — DGII (120 días cierre dic)','isr','Anual');
    add(`${y}-04-30`,'Bonificación Anual','10% utilidades netas (Art. 223 CT) — plazo 30 abril','bonif','Anual');
    add(`${y}-05-15`,'⚡ e-CF — Facturación Electrónica','Obligatorio para todos los contribuyentes (Ley 32-23) — registrarse en DGII antes del 15 mayo','ecf','Único');
    add(`${y}-11-30`,'Navidad — 1er Pago (50%)','Primer 50% de la regalía pascual (Art. 219 CT)','navidad','Anual');
    add(`${y}-12-20`,'Navidad — 2do Pago (50%)','Segundo 50% regalía pascual — plazo final 20 dic','navidad','Anual');
    return items.filter(i=>i.diff>=-3).sort((a,b)=>a.diff-b.diff);
  }}

  const TIPO_COLOR={tss:'#6B21A8',isr:'#DC2626',dgii:'#0369A1',dgt:'#003366',nomina:'#1A6B3A',bonif:'#7B4F00',navidad:'#065F46',itbis:'#B45309',ecf:'#7C3AED'};
  const TIPO_ICON ={tss:'🏦',isr:'📋',dgii:'📊',dgt:'📋',nomina:'💵',bonif:'🏆',navidad:'🎄',itbis:'🧾',ecf:'⚡'};
  const TIPO_LABEL={tss:'TSS',isr:'DGII-ISR',dgii:'DGII',dgt:'Min. Trabajo',nomina:'Nómina',bonif:'Bonificación',navidad:'Navidad',itbis:'ITBIS',ecf:'e-CF'};

  const compliance = buildCompliance();
  const [filtroTipo, setFiltroTipo] = useState('all');
  const visible = compliance.filter(i=>i.diff<=90);
  const visibleF = filtroTipo==='all' ? visible : visible.filter(i=>i.tipo===filtroTipo);
  const nextTSS = TSS_2026.find(t=>diasPara(t.limite)>=0);

  function CountdownBadge({diff}) {
    const bg = diff<0?'#DC2626':diff<=2?'#DC2626':diff<=7?'#F97316':diff<=14?'#CA8A04':'#16A34A';
    return <span style={{background:bg,color:'white',borderRadius:20,padding:'3px 10px',fontSize:11,fontWeight:800,whiteSpace:'nowrap'}}>
      {diff<0?`Venció hace ${Math.abs(diff)}d`:diff===0?'¡HOY!': `${diff} días`}
    </span>;
  }

  const FERIADOS_2026=[
    {f:'Jue 1 Ene', n:'Año Nuevo',                  nota:'Inamovible'},
    {f:'Lun 5 Ene', n:'Día de los Reyes Magos',     nota:'Cambiado desde mar 6'},
    {f:'Mié 21 Ene',n:'Ntra. Sra. de la Altagracia',nota:'Inamovible'},
    {f:'Lun 26 Ene',n:'Juan Pablo Duarte',           nota:'Inamovible'},
    {f:'Vie 27 Feb',n:'Día de la Independencia',     nota:'Inamovible'},
    {f:'Vie 3 Abr', n:'Viernes Santo',               nota:'Inamovible'},
    {f:'Lun 4 May', n:'Día del Trabajo',             nota:'Cambiado desde vie 1'},
    {f:'Jue 4 Jun', n:'Corpus Christi',              nota:''},
    {f:'Dom 16 Ago',n:'Día de la Restauración',      nota:'Inamovible'},
    {f:'Jue 24 Sep',n:'Ntra. Sra. de las Mercedes',  nota:''},
    {f:'Lun 9 Nov', n:'Día de la Constitución',      nota:'Cambiado desde vie 6'},
    {f:'Vie 25 Dic',n:'Navidad',                     nota:'Inamovible'},
  ];

  return (
    <div style={{maxWidth:980,margin:'0 auto',padding:24}}>
      <h2 style={{fontFamily:'Montserrat',color:'#003366',marginBottom:4}}>📅 Calendario Laboral 2026</h2>
      <p style={{fontSize:13,color:'#5A7090',marginBottom:20}}>TSS, DGII (IR-3, IR-17, IT-1, 606-609), Ministerio de Trabajo y Facturación Electrónica (e-CF Ley 32-23)</p>

      <div style={{display:'flex',gap:8,marginBottom:20}}>
        {[['compliance','⏰ Compliance & Pagos'],['tss','🏦 TSS 2026'],['feriados','📆 Feriados']].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)} style={{padding:'9px 18px',borderRadius:10,border:'none',cursor:'pointer',fontWeight:700,fontSize:13,background:tab===v?'#003366':'#F0F4FA',color:tab===v?'white':'#5A7090'}}>{l}</button>
        ))}
      </div>

      {tab==='compliance' && (<>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}}>
          {[['🔴 Vencidos/Hoy',visible.filter(i=>i.diff<=0).length,'#DC2626'],
            ['🟠 Esta semana',visible.filter(i=>i.diff>0&&i.diff<=7).length,'#F97316'],
            ['🟡 Este mes',visible.filter(i=>i.diff>7&&i.diff<=30).length,'#CA8A04'],
            ['🟢 Próx. 90 días',visible.filter(i=>i.diff>30&&i.diff<=90).length,'#16A34A'],
          ].map(([l,v,c])=>(
            <div key={l} className="card" style={{textAlign:'center',padding:'12px 8px'}}>
              <div style={{fontSize:11,color:'#5A7090',marginBottom:4}}>{l}</div>
              <div style={{fontSize:22,fontWeight:800,color:c}}>{v}</div>
            </div>

function Dgt3({ employees }) {
  const anio = new Date().getFullYear();
  const [pdfLoading, setPdfLoading] = useState(false);
  const [search, setSearch] = useState('');

  const rd = n => 'RD$' + Number(n).toLocaleString('es-DO',{minimumFractionDigits:2,maximumFractionDigits:2});

  function calcAntigüedad(emp) {
    const raw = emp.hireDate || emp.startDate || '';
    if (!raw) return '—';
    let ini;
    if (raw.includes('/')) { const [d,m,y]=raw.split('/'); ini=new Date(`${y}-${m}-${d}T12:00:00`); }
    else ini = new Date(raw + 'T12:00:00');
    const hoy = new Date();
    const yrs = Math.floor((hoy - ini) / (365.25*86400000));
    const mths = Math.floor(((hoy - ini) / (365.25*86400000) - yrs) * 12);
    if (yrs > 0) return yrs + ' año' + (yrs>1?'s':'') + (mths>0?', '+mths+' mes'+(mths>1?'es':''):'');
    return mths + ' mes' + (mths!==1?'es':'');
  }

  function fmtDate(raw) {
    if (!raw) return '—';
    let d;
    if (raw.includes('/')) { const [dd,mm,yy]=raw.split('/'); d=new Date(`${yy}-${mm}-${dd}T12:00:00`); }
    else d = new Date(raw+'T12:00:00');
    return d.toLocaleDateString('es-DO',{day:'2-digit',month:'2-digit',year:'numeric'});
  }

  function getTurno(emp) {
    const j = (emp.jornada||'').toLowerCase();
    if (j.includes('diurna')) return 'Diurna';
    if (j.includes('nocturna')) return 'Nocturna';
    if (j.includes('mixto') || j.includes('mix')) return 'Mixto';
    return emp.jornada || '—';
  }

  const filtered = employees.filter(e =>
    !search || e.name.toLowerCase().includes(search.toLowerCase())
  );

  function descargarPDF() {
    setPdfLoading(true);
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit:'mm', format:'a4', orientation:'landscape' });
      const W=297, M=10; let y=14;

      // Logo + Header
      try { doc.addImage(LOGO_TEA,'PNG',W/2-12,y,24,12); y+=14; } catch(e){ y+=4; }
      doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(0,34,102);
      doc.text('TRANSPORTE EMPRESARIAL AMALFI SRL', W/2, y, {align:'center'}); y+=6;
      doc.setFontSize(11); doc.setFont('helvetica','normal'); doc.setTextColor(60,60,60);
      doc.text('PLANILLA DE PERSONAL FIJO — DGT-3', W/2, y, {align:'center'}); y+=5;
      doc.setFontSize(9);
      doc.text(`RNC: 131-07998-9  ·  Art. 159 y 161 Código de Trabajo  ·  Reglamento 258/93 Arts. 15-16  ·  Año ${anio}`, W/2, y, {align:'center'}); y+=3;
      doc.text(`Fecha de emisión: ${new Date().toLocaleDateString('es-DO',{day:'2-digit',month:'2-digit',year:'numeric'})}  ·  Total de empleados: ${employees.length}`, W/2, y, {align:'center'}); y+=6;

      doc.setDrawColor(0,34,102); doc.setLineWidth(0.7);
      doc.line(M, y, W-M, y); y+=5;

      // Table headers
      const cols = [
        {label:'#',            x:M+1,  w:7},
        {label:'Cédula',       x:M+8,  w:22},
        {label:'Nombre Completo', x:M+30, w:48},
        {label:'Cargo / Ocupación', x:M+78, w:36},
        {label:'Área',         x:M+114, w:22},
        {label:'Salario',      x:M+136, w:24},
        {label:'F. Ingreso',   x:M+160, w:22},
        {label:'Antigüedad',   x:M+182, w:22},
        {label:'Turno',        x:M+204, w:18},
        {label:'F. Pago',      x:M+222, w:22},
        {label:'Tipo Contrato',x:M+244, w:30},
        {label:'NSS',          x:M+274, w:16},
      ];

      doc.setFillColor(0,34,102); doc.rect(M, y-4, W-2*M, 8,'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(255,255,255);
      cols.forEach(c => doc.text(c.label, c.x, y));
      y += 6;

      doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(0,0,0);

      const sorted = [...employees].sort((a,b)=>a.name.localeCompare(b.name));
      sorted.forEach((emp,i) => {
        if (y > 185) { doc.addPage(); y = 16; }
        if (i%2===0){doc.setFillColor(245,248,255);doc.rect(M,y-3.5,W-2*M,7,'F');}

        const cedFmt = emp.cedula ? emp.cedula.replace(/(\d{3})(\d+)(\d{1})/,'$1-$2-$3') : '—';
        const nm = emp.name.length>34 ? emp.name.substring(0,32)+'…' : emp.name;
        const pos = (emp.position||'—').length>22 ? (emp.position||'').substring(0,20)+'…' : (emp.position||'—');

        doc.text(String(i+1),     M+4,    y, {align:'right'});
        doc.text(emp.cedula||'—', M+8,    y);
        doc.setFont('helvetica','bold');
        doc.text(nm,              M+30,   y);
        doc.setFont('helvetica','normal');
        doc.text(pos,             M+78,   y);
        doc.text(emp.area||'—',   M+114,  y);
        doc.setFont('helvetica','bold'); doc.setTextColor(0,34,102);
        doc.text(rd(emp.salary||0), M+158, y, {align:'right'});
        doc.setFont('helvetica','normal'); doc.setTextColor(0,0,0);
        doc.text(fmtDate(emp.hireDate||emp.startDate), M+160, y);
        doc.text(calcAntigüedad(emp), M+182, y);
        doc.text(getTurno(emp),   M+204,  y);
        doc.text(emp.payFrequency||'—', M+222, y);
        doc.text(emp.contractType||'Tiempo Indefinido', M+244, y);
        doc.text(emp.nss||'—',    M+274,  y);
        y += 7;
      });

      // Totals
      y += 2;
      doc.setFillColor(0,34,102); doc.rect(M,y-4,W-2*M,9,'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(255,255,255);
      const totalSal = employees.reduce((s,e)=>s+(parseFloat(e.salary)||0),0);
      doc.text(`Total empleados: ${employees.length}`, M+10, y);
      doc.text(`Masa salarial total: ${rd(totalSal)}`, W/2, y, {align:'center'});
      doc.text('Ministerio de Trabajo — DGT-3', W-M-10, y, {align:'right'});
      y += 14;

      // Signature lines
      doc.setDrawColor(100,100,100); doc.setLineWidth(0.4);
      const sigY = y + 15;
      [[M+20, 'Representante Legal'],[W/2-30, 'Encargado de Recursos Humanos'],[W-M-80, 'Sello y Firma Ministerio de Trabajo']].forEach(([x, label]) => {
        doc.line(x, sigY, x+60, sigY);
        doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(80,80,80);
        doc.text(label, x+30, sigY+4, {align:'center'});
      });

      doc.setFontSize(7); doc.setTextColor(130,130,130);
      doc.text(`Portal de renovación: https://ovi.mt.gob.do  ·  Plazo anual: 15 de enero  ·  Arts. 159 y 161 Código de Trabajo  ·  Reglamento 258/93`, W/2, 205, {align:'center'});

      doc.save(`DGT3_PersonalFijo_${anio}_Amalfi.pdf`);
    } finally { setPdfLoading(false); }
  }

  const sorted = [...filtered].sort((a,b) => a.name.localeCompare(b.name));
  const totalSal = employees.reduce((s,e)=>s+(parseFloat(e.salary)||0),0);

  return (
    <div style={{maxWidth:1000,margin:'0 auto',padding:24}}>
      <h2 style={{fontFamily:'Montserrat',color:'#003366',marginBottom:4}}>📋 Planilla Personal Fijo — DGT-3</h2>
      <p style={{fontSize:13,color:'#5A7090',marginBottom:16}}>
        Ministerio de Trabajo · Art. 159 y 161 Código de Trabajo · Reglamento 258/93 Arts. 15-16
      </p>

      {/* Alert card */}
      <div style={{background:'#FFF7ED',border:'2px solid #F97316',borderRadius:12,padding:'14px 18px',
        marginBottom:20,display:'flex',gap:14,alignItems:'center'}}>
        <div style={{fontSize:28}}>⚠️</div>
        <div>
          <div style={{fontWeight:800,color:'#9A3412',fontSize:14,marginBottom:3}}>
            Renovación anual obligatoria — Plazo: 15 de enero de cada año
          </div>
          <div style={{fontSize:13,color:'#7C2D12',lineHeight:1.6}}>
            Registra o renueva en <strong>https://ovi.mt.gob.do</strong> · Adquiere el formulario en la División de Tesorería del Ministerio de Trabajo o con tarjeta de crédito/débito en línea · Introduce el PIN + código de aprobación para validar.
          </div>
        </div>
      </div>

      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:20}}>
        {[
          ['👥 Total Empleados', employees.length, '#003366'],
          ['💰 Masa Salarial', rd(totalSal), '#1A6B3A'],
          ['📅 Próxima renovación', '15 Ene ' + (new Date().getFullYear()+1), '#DC2626'],
        ].map(([label,val,color])=>(
          <div key={label} className="card" style={{textAlign:'center',padding:'14px 10px'}}>
            <div style={{fontSize:12,color:'#5A7090',marginBottom:4}}>{label}</div>

          </div>
        ))}
      </div>

      {/* Actions */}
      <div style={{display:'flex',gap:12,marginBottom:16,alignItems:'center',flexWrap:'wrap'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="🔍 Buscar empleado..."

          </label>
          <div style={{position:'relative'}}>
            <input type={showPw?'text':'password'} value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={onKey}
              placeholder="••••••••"
              style={{width:'100%',padding:'11px 42px 11px 14px',border:'1.5px solid #D0DCF0',borderRadius:9,
                fontSize:14,outline:'none',boxSizing:'border-box'}}/>
            <button onClick={()=>setShowPw(!showPw)}
              style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',
                background:'none',border:'none',cursor:'pointer',fontSize:16,color:'#8090A0'}}>
              {showPw?'🙈':'👁'}
            </button>
          </div>
        </div>
        {error && (
          <div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:8,
            padding:'10px 14px',marginBottom:14,fontSize:13,color:'#DC2626',textAlign:'left'}}>
            ⚠️ {error}
          </div>
        )}
        <button onClick={handle} disabled={loading||!email||!pw}
          style={{width:'100%',padding:'13px',background:loading||!email||!pw?'#8090A0':'#003366',
            color:'white',border:'none',borderRadius:10,fontSize:15,fontWeight:700,
            cursor:loading||!email||!pw?'default':'pointer',
            boxShadow:'0 4px 14px rgba(0,51,102,.35)'}}>
          {loading?'Verificando...':'🔐 Ingresar al Sistema'}
        </button>
        <div style={{marginTop:20,fontSize:11,color:'#A0AEC0',lineHeight:1.6}}>
          RNC: 131-07998-9 · Distrito Nacional, RD<br/>
          <span style={{color:'#D0D8E8'}}>Los datos se guardan en la nube con Firebase</span>
        </div>
      </div>
    </div>
  );
}



// ── RAÍZ CON FIREBASE ─────────────────────────────────────────────────────
function Root() {
  const [user,       setUser]     = useState(undefined);
  const [employees,  setEmpState] = useState(null);
  const [periods,    setPerState] = useState(null);
  const [authError,  setAuthErr]  = useState('');
  const [authLoad,   setAuthLoad] = useState(false);

  useEffect(() => fbAuth.onAuthStateChanged(u => setUser(u || null)), []);

  useEffect(() => {
    if (!user) return;
    const unsub1 = fbDB.collection('employees').onSnapshot(snap => {
      const data = snap.docs.map(d => ({ ...d.data(), id: d.id }));
      if (data.length === 0) seedEmployees();
      else setEmpState(data.sort((a,b) => a.name.localeCompare(b.name)));
    });
    const unsub2 = fbDB.collection('periods').onSnapshot(snap => {
      setPerState(snap.docs.map(d => ({ ...d.data(), id: d.id }))
        .sort((a,b) => a.periodId - b.periodId));
    });
    return () => { unsub1(); unsub2(); };
  }, [user]);

  async function seedEmployees() {
    const batch = fbDB.batch();
    SEED_EMPLOYEES.forEach(e => batch.set(fbDB.collection('employees').doc(String(e.id)), e));
    await batch.commit();
  }

  async function saveEmployee(emp) {
    const id = String(emp.id || Date.now());
    await fbDB.collection('employees').doc(id).set({ ...emp, id });
  }

  async function deleteEmployee(id) {
    await fbDB.collection('employees').doc(String(id)).delete();
  }

  async function savePeriod(period) {
    await fbDB.collection('periods').doc(String(period.periodId)).set(period);
  }

  async function handleLogin(email, password) {
    setAuthLoad(true); setAuthErr('');
    try { await fbAuth.signInWithEmailAndPassword(email, password); }
    catch(e) { setAuthErr('Correo o contraseña incorrectos. Verifica tus datos de Firebase Authentication.'); }
    setAuthLoad(false);
  }

  const spinner = msg => (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',
      background:'linear-gradient(135deg,#001a40,#003366)'}}>
      <div style={{color:'white',textAlign:'center'}}>
        <div style={{fontSize:48,marginBottom:12}}>🚌</div>
        <div style={{fontSize:16,opacity:.7}}>{msg}</div>
      </div>
    </div>
  );

  if (user === undefined) return spinner('Iniciando sistema...');
  if (!user) return <LoginScreen onLogin={handleLogin} error={authError} loading={authLoad}/>;
  if (!employees || !periods) return spinner('Cargando datos...');

  return (
    <App
      savedEmployees={employees}
      savedPeriods={periods}
      setEmployees={fn => {
        const next = typeof fn === 'function' ? fn(employees) : fn;
        next.forEach(e => saveEmployee(e));
      }}
      setPeriods={fn => {
        const next = typeof fn === 'function' ? fn(periods) : fn;
        next.forEach(p => savePeriod(p));
      }}
      saveEmployee={saveEmployee}
      savePeriod={savePeriod}
      deleteEmployee={deleteEmployee}
      onLogout={() => fbAuth.signOut()}
      userEmail={user.email}
    />
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);

</script>
</body>
</html>
