function calcPayroll(emp, incomesExtra = [], deductionsExtra = []) {
  const freq = emp.payFrequency === "quincenal" ? 2 : 1;
  const periodSalary = emp.salary / freq;
  const tssBased = incomesExtra.filter(i => INCOME_TYPES.find(t => t.value === i.type)?.affectsTSS).reduce((s, i) => s + (i.amount || 0), 0);
  const nonTss = incomesExtra.filter(i => !INCOME_TYPES.find(t => t.value === i.type)?.affectsTSS).reduce((s, i) => s + (i.amount || 0), 0);
  const baseTSS = periodSalary + tssBased;
  const afpBase = Math.min(baseTSS, RATES.AFP_TOPE / freq);
  const sfsBase = Math.min(baseTSS, RATES.SFS_TOPE / freq);
  const afpWorker = afpBase * RATES.AFP_WORKER;
  const sfsWorker = sfsBase * RATES.SFS_WORKER;
  const cotizable = baseTSS - afpWorker - sfsWorker + nonTss;
  const periods12 = freq === 2 ? 24 : 12;
  const cotizableAnual = cotizable * periods12;
  let isrAnual = 0;
  for (const s of ISR_SCALES) {
    if (cotizableAnual > s.min) {
      if (cotizableAnual <= s.max) { isrAnual = (cotizableAnual - s.min) * s.rate + s.base; break; }
      else if (s.max === Infinity) { isrAnual = (cotizableAnual - s.min) * s.rate + s.base; }
    }
  }
  const isrPeriodo = isrAnual / periods12;
  const extraDeducTotal = deductionsExtra.reduce((s, d) => s + (d.amount || 0), 0);
  const totalDeductions = afpWorker + sfsWorker + isrPeriodo + extraDeducTotal;
  const totalAPagar = cotizable - isrPeriodo - extraDeducTotal;
  const afpEmpresa = Math.min(periodSalary, RATES.AFP_TOPE / freq) * RATES.AFP_COMPANY;
  const sfsEmpresa = Math.min(periodSalary, RATES.SFS_TOPE / freq) * RATES.SFS_COMPANY;
  const srlEmpresa = Math.min(periodSalary, RATES.SRL_TOPE / freq) * RATES.SRL_COMPANY;
  const infotep    = baseTSS * RATES.INFOTEP;
  const costEmpresa = periodSalary + tssBased + nonTss + afpEmpresa + sfsEmpresa + srlEmpresa + infotep;
  return { periodSalary, baseTSS, tssBased, nonTss, afpWorker, sfsWorker, isrPeriodo, extraDeducTotal, totalDeductions, cotizable, cotizableAnual, totalAPagar, afpEmpresa, sfsEmpresa, srlEmpresa, infotep, costEmpresa, incomesExtra, deductionsExtra };
}

function generatePeriods() {

  const dl = [31,28,31,30,31,30,31,31,30,31,30,31];
  return mn.flatMap((m, i) => [
    { id:`2026-${i+1}-1`, label:`1 ${m} - 15 ${m}`,      year:2026, month:i+1, half:1 },
    { id:`2026-${i+1}-2`, label:`16 ${m} - ${dl[i]} ${m}`, year:2026, month:i+1, half:2 },
  ]);
}

  };

  const setPeriods = (updater) => {
    setPeriodsLocal(prev => {

  };

  const [selectedPeriod, setSelectedPeriod] = useState(null);
  const [viewPayslip, setViewPayslip] = useState(null);
  const [search, setSearch] = useState("");
  const [toast, setToast] = useState(null);
  const showToast = (msg, type='success') => setToast({ msg, type });

  const reminders = useMemo(() => {
    const bdays = [], vacs = [], licencias = [];
    employees.forEach(emp => {
      // Licencias próximas a vencer (60 días) o vencidas
      if (emp.licenciaVence) {
        const vence = new Date(emp.licenciaVence + "T12:00:00");
        const days  = Math.floor((vence - today) / 86400000);
        if (days <= 60) licencias.push({ emp, days, vence: vence.toLocaleDateString("es-DO",{day:"2-digit",month:"2-digit",year:"numeric"}) });
      }
      const bd = nextBirthday(emp.birthdate);
      if (bd && bd.days <= 30) bdays.push({ emp, bd });
      const yrs = yearsWorked(emp.hireDate);
      if (yrs > 0) {
        const hire = new Date(emp.hireDate);
        const next = new Date(today.getFullYear(), hire.getMonth(), hire.getDate());
        if (next < today) next.setFullYear(today.getFullYear() + 1);
        const days = Math.floor((next - today) / 86400000);
        if (days <= 45) vacs.push({ emp, daysToVac: days, vacDays: vacationDays(emp.hireDate), nextDate: next.toLocaleDateString("es-DO",{day:"2-digit",month:"2-digit",year:"numeric"}) });
      }
    });
    return { bdays: bdays.sort((a,b) => a.bd.days - b.bd.days), licencias: licencias.sort((a,b) => a.days - b.days), vacs: vacs.sort((a,b) => a.daysToVac - b.daysToVac) };
  }, [employees]);

        else{nombres=emp.name;}

          'Numero de documento': emp.cedula||'',

// Convierte YYYY-MM-DD → DD/MM/AAAA (para mostrar)
function toDisplayDate(val) {
  if (!val) return '';
  const parts = val.split('-');
  if (parts.length === 3) return parts[2] + '/' + parts[1] + '/' + parts[0];
  return val;
}
// Convierte DD/MM/AAAA → YYYY-MM-DD (para guardar)
function fromDisplayDate(val) {
  if (!val) return '';
  const parts = val.split('/');
  if (parts.length === 3 && parts[2].length === 4) return parts[2] + '-' + parts[1].padStart(2,'0') + '-' + parts[0].padStart(2,'0');
  return val;
}
// Valida que sea fecha DD/MM/AAAA válida
function isValidDisplayDate(val) {
  if (!val) return true;
  const m = val.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (!m) return false;
  const d = parseInt(m[1]), mo = parseInt(m[2]), y = parseInt(m[3]);
  return d >= 1 && d <= 31 && mo >= 1 && mo <= 12 && y >= 1900 && y <= 2100;
}

function Toast({ msg, type='success', onDone }) {

  }, []);
  const bg = type === 'success' ? '#16A34A' : type === 'error' ? '#DC2626' : '#E8A020';
  return (
    <div style={{
      position:'fixed', bottom:28, right:28, zIndex:9999,
      background:bg, color:'white', borderRadius:12,
      padding:'14px 22px', fontWeight:700, fontSize:15,
      boxShadow:'0 8px 32px rgba(0,0,0,.25)',
      display:'flex', alignItems:'center', gap:10,
      animation:'slideUp .25s ease'
    }}>
      <style>{`@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}`}</style>
      {type==='success'?'✅':type==='error'?'❌':'⚠️'} {msg}
    </div>
  );
}

function EmployeeModal({ onClose, onSave, initial }) {

    set("dependientes",[...(form.dependientes||[]),{...newDep}]);
    setNewDep({nss:"",nombre:"",parentesco:"Hijo"});

      <div className="g2"><div className="fg"><label className="fl">Cédula *</label><input className="fi" value={form.cedula} onChange={e=>set("cedula",e.target.value)} placeholder="00000000000"/></div><div className="fg"><label className="fl">Clave TSS</label><input className="fi" value={form.tss} onChange={e=>set("tss",e.target.value)} placeholder="001"/></div></div>
      <div className="fg"><label className="fl">Nombre Completo *</label><input className="fi" value={form.name} onChange={e=>set("name",e.target.value)}/></div>
      <div className="g2"><div className="fg"><label className="fl">Puesto *</label><input className="fi" value={form.position} onChange={e=>set("position",e.target.value)}/></div><div className="fg"><label className="fl">Área</label><select className="fs" value={form.area} onChange={e=>set("area",e.target.value)}><option>Operativa</option><option>Administrativa</option><option>Gerencial</option></select></div></div>
      <div className="g2"><div className="fg"><label className="fl">Fecha de Nacimiento</label><input className="fi" type="text" placeholder="DD/MM/AAAA" maxLength={10} value={toDisplayDate(form.birthdate)} onChange={e=>{ const v=e.target.value.replace(/[^0-9/]/g,""); set("birthdate", fromDisplayDate(v)); }} onBlur={e=>{ if(e.target.value && !isValidDisplayDate(e.target.value)) e.target.style.borderColor="#DC2626"; else e.target.style.borderColor=""; }}/></div><div className="fg"><label className="fl">Fecha de Ingreso *</label><input className="fi" type="text" placeholder="DD/MM/AAAA" maxLength={10} value={toDisplayDate(form.hireDate)} onChange={e=>{ const v=e.target.value.replace(/[^0-9/]/g,""); set("hireDate", fromDisplayDate(v)); }} onBlur={e=>{ if(e.target.value && !isValidDisplayDate(e.target.value)) e.target.style.borderColor="#DC2626"; else e.target.style.borderColor=""; }}/></div></div>
      <div className="g2"><div className="fg"><label className="fl">Salario Mensual (RD$) *</label><input className="fi" type="number" value={form.salary} onChange={e=>set("salary",parseFloat(e.target.value)||0)}/></div><div className="fg"><label className="fl">Frecuencia de Pago</label><select className="fs" value={form.payFrequency} onChange={e=>set("payFrequency",e.target.value)}><option value="quincenal">Quincenal</option><option value="mensual">Mensual</option></select></div></div>
      <div className="g2"><div className="fg"><label className="fl">Banco</label><select className="fs" value={form.bank} onChange={e=>set("bank",e.target.value)}><option value="">Seleccionar...</option>{["Banco Popular","BHD León","Scotiabank","Banreservas","Banco Santa Cruz"].map(b=><option key={b}>{b}</option>)}</select></div><div className="fg"><label className="fl">No. de Cuenta</label><input className="fi" value={form.account} onChange={e=>set("account",e.target.value)}/></div></div>
      <div className="g2"><div className="fg"><label className="fl">Tipo de Cuenta</label><select className="fs" value={form.accountType} onChange={e=>set("accountType",e.target.value)}><option>Ahorros</option><option>Corriente</option></select></div><div className="fg"><label className="fl">Teléfono</label><input className="fi" value={form.telefono||""} onChange={e=>set("telefono",e.target.value)} placeholder="+18291234567"/></div></div>
      <div className="g2"><div className="fg"><label className="fl">Dirección</label><input className="fi" value={form.direccion||""} onChange={e=>set("direccion",e.target.value)} placeholder="Calle, No., Sector"/></div><div className="fg"><label className="fl">Municipio</label><input className="fi" value={form.municipio||""} onChange={e=>set("municipio",e.target.value)} placeholder="Santo Domingo de Guzmán"/></div></div>
      <div className="g2"><div className="fg"><label className="fl">Jornada Laboral</label><select className="fs" value={form.jornada||""} onChange={e=>set("jornada",e.target.value)}><option value="">Seleccionar...</option><option>Diurna</option><option>Mixto</option><option>Nocturna</option></select></div><div className="fg"><label className="fl">Método de Pago</label><select className="fs" value={form.metodoPago||""} onChange={e=>set("metodoPago",e.target.value)}><option value="">Seleccionar...</option><option>Efectivo</option><option>Transferencia bancaria</option><option>Cheque</option></select></div></div>
      <div className="g2"><div className="fg"><label className="fl">Tipo de Contrato</label><select className="fs" value={form.contractType} onChange={e=>set("contractType",e.target.value)}><option>Tiempo Indefinido</option><option>Fijo</option><option>Temporal</option></select></div></div>

      {/* NSS y ARS */}
      <div style={{margin:"16px 0 8px",padding:"12px 14px",background:"#EFF6FF",borderRadius:10,border:"1px solid #BFDBFE"}}>
        <div style={{fontSize:12,fontWeight:700,color:"#1E40AF",marginBottom:10}}>🏥 TSS / Seguro de Salud</div>
        <div className="g2">
          <div className="fg"><label className="fl">NSS (No. Seguridad Social)</label><input className="fi" value={form.nss||""} onChange={e=>set("nss",e.target.value)} placeholder="Ej: 11864242"/></div>
          <div className="fg"><label className="fl">ARS (Aseguradora de Riesgos)</label>
            <select className="fs" value={form.ars||""} onChange={e=>set("ars",e.target.value)}>
              <option value="">Seleccionar ARS...</option>
              {["SEGURO NACIONAL DE SALUD (SENASA) - REGIMEN CONTRIBUTIVO","ARS FUTURO","ARS RENACER","PRIMERA ARS","ARS APS","ARS DR. YUNEN","ARS COLEGIO MEDICO DOMINICANO CMD","ARS RESERVAS","ARS HUMANO","ARS SIMAG"].map(a=><option key={a} value={a}>{a}</option>)}
            </select>
          </div>
        </div>
      </div>

      {/* Dependientes */}
      <div style={{margin:"8px 0 12px",padding:"12px 14px",background:"#F0FDF4",borderRadius:10,border:"1px solid #BBF7D0"}}>
        <div style={{fontSize:12,fontWeight:700,color:"#15803D",marginBottom:10}}>👨‍👩‍👧 Dependientes ({(form.dependientes||[]).length})</div>
        {(form.dependientes||[]).map((d,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,background:"white",borderRadius:8,padding:"7px 10px",border:"1px solid #BBF7D0"}}>
            <span style={{fontSize:13,flex:1,fontWeight:600}}>{d.nombre}</span>
            <span style={{fontSize:11,color:"#15803D"}}>{d.parentesco}</span>
            <span style={{fontSize:11,color:"#5A7090"}}>NSS: {d.nss}</span>
            <button onClick={()=>removeDep(i)} style={{background:"#FEE2E2",border:"none",borderRadius:6,padding:"2px 8px",cursor:"pointer",color:"#DC2626",fontWeight:700,fontSize:12}}>✕</button>
          </div>
        ))}
        <div style={{display:"flex",gap:6,marginTop:8}}>
          <input className="fi" style={{flex:1}} placeholder="NSS dependiente" value={newDep.nss} onChange={e=>setNewDep(d=>({...d,nss:e.target.value}))}/>
          <input className="fi" style={{flex:2}} placeholder="Nombre completo" value={newDep.nombre} onChange={e=>setNewDep(d=>({...d,nombre:e.target.value}))}/>
          <select className="fs" style={{flex:1}} value={newDep.parentesco} onChange={e=>setNewDep(d=>({...d,parentesco:e.target.value}))}>
            {["Hijo","Hija","Hijastro","Hijasta","Compañero(a) de Vida","Cónyuge - Esposa","Cónyuge - Esposo"].map(p=><option key={p}>{p}</option>)}

          <button onClick={addDep} className="btn bp1" style={{fontSize:12,padding:"0 12px",whiteSpace:"nowrap"}}>+ Add</button>

      {/* ── Licencia de Conducir ── */}
      <div style={{background:"#FFF7ED",border:"1px solid #FED7AA",borderRadius:12,padding:"14px 16px",marginBottom:12}}>
        <div style={{fontWeight:700,color:"#92400E",marginBottom:10,fontSize:13}}>🪪 Licencia de Conducir</div>
        <div className="g2">
          <div className="fg">
            <label className="fl">Número de Licencia</label>
            <input className="fi" placeholder="Ej: 0123456" value={form.licenciaNum||""} onChange={e=>set("licenciaNum",e.target.value)}/>
          </div>
          <div className="fg">
            <label className="fl">Fecha de Vencimiento (DD/MM/AAAA)</label>
            <input className="fi" type="text" placeholder="DD/MM/AAAA" maxLength={10}
              value={toDisplayDate(form.licenciaVence||"")}
              onChange={e=>{ const v=e.target.value.replace(/[^0-9/]/g,""); set("licenciaVence", fromDisplayDate(v)); }}
              style={{borderColor: form.licenciaVence && new Date(form.licenciaVence+"T12:00:00") < today ? "#DC2626" : ""}}
            />
            {form.licenciaVence && (() => {
              const days = Math.floor((new Date(form.licenciaVence+"T12:00:00") - today) / 86400000);
              if (days < 0)   return <div style={{fontSize:11,color:"#DC2626",marginTop:3}}>🚨 Vencida hace {Math.abs(days)} días</div>;
              if (days <= 15) return <div style={{fontSize:11,color:"#D97706",marginTop:3}}>⚠️ Vence en {days} días</div>;
              if (days <= 60) return <div style={{fontSize:11,color:"#65A30D",marginTop:3}}>📋 Vence en {days} días</div>;
              return <div style={{fontSize:11,color:"#16A34A",marginTop:3}}>✅ Vigente — {days} días restantes</div>;
            })()}
          </div>
        </div>
      </div>

      <div className="mof"><button className="btn bol" onClick={onClose}>Cancelar</button><button className="btn bp1" onClick={() => { if(!form.cedula||!form.name||!form.salary)return alert("Complete campos obligatorios"); onSave(form); }}>{initial?"Guardar Cambios":"Registrar Empleado"}</button></div>
    </div></div>
  );
}

function Nomina({ employees, periods, setPeriods, savePeriod, showToast, showNew, setShowNew, selectedPeriod, setSelectedPeriod, viewPayslip, setViewPayslip }) {
  const [periodId, setPeriodId] = useState("");
  const [empExtras, setEmpExtras] = useState({});
  const [step, setStep] = useState(1);
  const [noveltyEmp, setNoveltyEmp] = useState(null);

  const activePeriod = ALL_PERIODS.find(p => p.id === periodId);
  const getEmpData = id => empExtras[id] || { incomes: [], deductions: [] };
  const setEmpData = (id, data) => setEmpExtras(p => ({ ...p, [id]: data }));

  const rows = employees.map(e => { const d = getEmpData(e.id); return { emp: e, calc: calcPayroll(e, d.incomes||[], d.deductions||[]), extras: d }; });
  const totals = rows.reduce((s,r) => ({ b:s.b+r.calc.periodSalary, n:s.n+r.calc.totalAPagar, d:s.d+r.calc.totalDeductions, c:s.c+r.calc.costEmpresa }), { b:0,n:0,d:0,c:0 });

  const handleSave = () => {
    const pd = { periodId, period: activePeriod, createdAt: new Date().toISOString(), rows };
    setPeriods(p => [...p.filter(x => x.periodId !== periodId), pd]);
    if(showToast) showToast('✅ Nómina guardada correctamente');
    setSelectedPeriod(pd); setStep(3);
  };

  if (viewPayslip) {
    return <PayslipView data={viewPayslip} periodLabel={selectedPeriod?.period?.label||""} periodYear={selectedPeriod?.period?.year||""} onBack={() => setViewPayslip(null)} />;
  }

  return (
    <>
      <div className="fjb mb3"><div><div className="pt">Cálculo de Nómina</div><div className="ps">Devengados y deducciones · República Dominicana 2026</div></div>{!showNew&&<button className="btn bac" onClick={()=>{setShowNew(true);setStep(1);setPeriodId("");setEmpExtras({})}}>+ Nuevo Período</button>}</div>

      {showNew && (
        <div className="card mb4">
          <div style={{display:"flex",gap:8,marginBottom:22}}>
            {["1. Seleccionar Período","2. Novedades y Cálculo","3. Confirmada"].map((s,i) => (
              <div key={i} style={{flex:1,textAlign:"center",padding:"10px",borderRadius:8,background:step===i+1?"#003366":step>i+1?"#DCFCE7":"#F0F4FA",color:step===i+1?"white":step>i+1?"#15803D":"#5A7090",fontWeight:600,fontSize:13}}>{s}</div>
            ))}
          </div>

          {step === 1 && (
            <>
              <div style={{fontFamily:"Montserrat",fontSize:19,fontWeight:700,color:"#003366",marginBottom:5}}>Nuevo Período</div>
              <div className="tm mb3">Selecciona el período de nómina — Año 2026</div>
              <div className="pc">
                {ALL_PERIODS.map(p => {
                  const done = periods.find(pp => pp.periodId === p.id);
                  return (
                    <div key={p.id} className={`pcd${periodId===p.id?" sel":""}${done?" dn":""}`} onClick={() => !done && setPeriodId(p.id)}>
                      <div style={{fontSize:13,fontWeight:700}}>{p.label.split(" - ")[0]}</div>
                      <div style={{fontSize:11,opacity:.7}}>— {p.label.split(" - ")[1]}</div>
                      {done && <div style={{fontSize:10,color:"#16A34A",marginTop:3}}>✓ Pagada</div>}
                    </div>
                  );
                })}
              </div>
              <div className="mof"><button className="btn bol" onClick={()=>setShowNew(false)}>Cancelar</button><button className="btn bp1" disabled={!periodId} onClick={()=>setStep(2)} style={{opacity:periodId?1:.5}}>Crear Período →</button></div>
            </>
          )}

          {step === 2 && (
            <>
              <div className="fjb mb3">
                <div><div style={{fontFamily:"Montserrat",fontSize:18,fontWeight:700,color:"#003366"}}>{activePeriod?.label} {activePeriod?.year}</div><div className="tm">{employees.length} empleados</div></div>
                <div className="fc" style={{gap:10,flexWrap:"wrap"}}>
                  {[{l:"Bruto",v:totals.b,c:"#003366"},{l:"Descuentos",v:totals.d,c:"#DC2626"},{l:"Neto a Pagar",v:totals.n,c:"#16A34A"},{l:"Costo Empresa",v:totals.c,c:"#7C3AED"}].map((s,i) => (
                    <div key={i} className="csm" style={{textAlign:"center",minWidth:120}}><div style={{fontSize:11,color:"#5A7090",marginBottom:2}}>{s.l}</div><div style={{fontWeight:800,color:s.c,fontSize:14,fontFamily:"Montserrat"}}>{fmt(s.v)}</div></div>
                  ))}
                </div>
              </div>
              <div style={{marginBottom:18}}><div className="tm mb1">Progreso de cálculo — {employees.length} empleados</div><div className="pg"><div className="pf" style={{width:"100%"}}></div></div></div>
              <div className="tw">
                <table>
                  <thead><tr><th>Empleado</th><th>Identificación</th><th>Salario</th><th>Ingresos Adicionales</th><th>Deducciones</th><th className="tr">Total a Pagar</th><th>Estado</th></tr></thead>
                  <tbody>
                    {rows.map(({emp,calc,extras}) => {
                      const incs = extras.incomes||[], deds = extras.deductions||[];
                      const ei = incs.reduce((s,i)=>s+i.amount,0);
                      return (
                        <tr key={emp.id}>
                          <td><div style={{fontWeight:600}}>{emp.name}</div><div className="tm">{emp.position}</div></td>
                          <td>{emp.cedula}</td>
                          <td>{fmt(calc.periodSalary)}</td>
                          <td>
                            <div className="fc" style={{gap:6}}>
                              <span className="inc">{ei>0?`+${fmt(ei)}`:fmt(0)}</span>
                              <button className="btn bsm bgh" onClick={() => setNoveltyEmp({emp,mode:"income"})}>
                                + Ingresos {incs.length>0&&<span className="badge bg" style={{marginLeft:3}}>{incs.length}</span>}
                              </button>
                            </div>
                          </td>
                          <td>
                            <div className="fc" style={{gap:6}}>
                              <span className="dec">-{fmt(calc.totalDeductions)}</span>
                              <button className="btn bsm bgh" onClick={() => setNoveltyEmp({emp,mode:"deduction"})}>
                                − Deduc. {deds.length>0&&<span className="badge bo" style={{marginLeft:3}}>{deds.length}</span>}
                              </button>
                            </div>
                          </td>
                          <td className="tr inc tb" style={{fontSize:15}}>{fmt(calc.totalAPagar)}</td>
                          <td><span className="badge bg">● Calculado</span></td>
                        </tr>
                      );
                    })}
                    <tr style={{background:"#F0F4FA",fontWeight:700}}>
                      <td colSpan={2}>TOTALES</td><td>{fmt(totals.b)}</td>
                      <td className="inc">{fmt(rows.reduce((s,r)=>s+r.calc.tssBased+r.calc.nonTss,0))}</td>
                      <td className="dec">-{fmt(totals.d)}</td>
                      <td className="tr inc" style={{fontSize:15}}>{fmt(totals.n)}</td><td></td>
                    </tr>
                  </tbody>
                </table>
              </div>
              <div className="mof"><button className="btn bol" onClick={()=>setStep(1)}>← Atrás</button><button className="btn bp1" onClick={handleSave}>✅ Confirmar Nómina</button></div>
            </>
          )}

          {step === 3 && selectedPeriod && (
            <div className="tc" style={{padding:"30px 0"}}>
              <div style={{fontSize:50,marginBottom:11}}>✅</div>
              <div style={{fontFamily:"Montserrat",fontSize:22,fontWeight:700,color:"#003366",marginBottom:5}}>¡Nómina Confirmada!</div>
              <div className="tm mb2">Período {selectedPeriod.period?.label} {selectedPeriod.period?.year}</div>
              <div style={{fontFamily:"Montserrat",fontSize:32,fontWeight:800,color:"#16A34A",margin:"14px 0"}}>{fmt(totals.n)}</div>
              <div className="tm">Total neto pagado a {employees.length} colaboradores</div>
              <button className="btn bol mt3" onClick={()=>setShowNew(false)}>Cerrar</button>
            </div>
          )}
        </div>
      )}

      <div className="card">
        <div style={{fontFamily:"Montserrat",fontWeight:700,color:"#003366",marginBottom:14}}>📋 Historial de Nóminas</div>
        {periods.length === 0
          ? <div className="tc tm" style={{padding:"36px 0"}}><div style={{fontSize:38,marginBottom:11}}>📋</div><div>No hay nóminas procesadas aún</div></div>
          : <div className="tw"><table><thead><tr><th>Período</th><th>Empleados</th><th>Total Neto</th><th>Costo Empresa</th><th>Procesada</th><th>Acciones</th></tr></thead><tbody>{periods.slice().reverse().map(p => {
              const tn=p.rows.reduce((s,r)=>s+r.calc.totalAPagar,0), tc=p.rows.reduce((s,r)=>s+r.calc.costEmpresa,0);
              return <tr key={p.periodId}><td><span className="badge bb">{p.period?.label}</span> <span className="tm">{p.period?.year}</span></td><td>{p.rows.length}</td><td className="inc tb">{fmt(tn)}</td><td style={{color:"#7C3AED",fontWeight:700}}>{fmt(tc)}</td><td>{fmtDate(p.createdAt)}</td><td style={{display:"flex",gap:6}}>
                  <button className="btn bsm bol" onClick={()=>setSelectedPeriod(p)}>👁 Ver</button>
                  <button onClick={()=>setConfirmDelete(p)}
                    style={{background:"#FEF2F2",color:"#DC2626",border:"1px solid #FECACA",
                      borderRadius:8,padding:"5px 10px",fontWeight:700,cursor:"pointer",fontSize:12}}>
                    🗑 Eliminar
                  </button>
                </td></tr>;
            })}</tbody></table></div>
        }
      </div>

      {/* Modal confirmar eliminar */}
      {confirmDelete && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:9999,
          display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>

            width:"100%",boxShadow:"0 24px 64px rgba(0,0,0,.3)",textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:12}}>🗑️</div>
            <div style={{fontWeight:800,fontSize:18,color:"#DC2626",marginBottom:8}}>
              Eliminar Nómina
            </div>
            <div style={{fontSize:14,color:"#5A7090",marginBottom:20,lineHeight:1.6}}>
              ¿Segura que deseas eliminar la nómina de<br/>
              <strong>{confirmDelete.period?.label} {confirmDelete.period?.year}</strong>?<br/>
              <span style={{color:"#DC2626",fontSize:13}}>Esta acción no se puede deshacer.</span>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setConfirmDelete(null)}
                style={{flex:1,padding:11,background:"#F0F4FA",border:"none",

                Cancelar

                  borderRadius:10,fontWeight:700,color:"white",cursor:"pointer",fontSize:14}}>
                Sí, eliminar
              </button>
            </div>
          </div>
        </div>
      )}

function NoveltyModal({ emp, mode, data, onSave, onClose }) {
  const [incomes, setIncomes] = useState(data.incomes || []);

  const addItem = () => mode === "income" ? setIncomes(p=>[...p,{id:Date.now(),type:"transporte_extra",amount:0,desc:""}]) : setDeductions(p=>[...p,{id:Date.now(),type:"inasistencia",amount:0,desc:""}]);
  const removeItem = id => mode === "income" ? setIncomes(p=>p.filter(i=>i.id!==id)) : setDeductions(p=>p.filter(i=>i.id!==id));
  const updateItem = (id,field,val) => {
    const upd = p => p.map(i => i.id===id ? {...i,[field]:field==="amount"?parseFloat(val)||0:val} : i);

          {[{l:"AFP — Fondo de Pensiones (2.87%)",v:calc.afpWorker},{l:"SFS — Seguro Familiar de Salud (3.04%)",v:calc.sfsWorker},...(calc.isrPeriodo>0?[{l:"ISR — Impuesto sobre la Renta (DGII)",v:calc.isrPeriodo}]:[])].map((s,i) => (

              <div className="fjb"><span style={{fontWeight:700,fontSize:13}}>🔒 {s.l}</span><span className="badge bo" style={{fontSize:11}}>En todas las nóminas</span></div>

// ── EXPORTAR RECIBO A PDF (jsPDF) ─────────────────────────────────────────
function exportPayslipPDF(data, periodLabel, periodYear, logoB64) {
  const { emp, calc } = data;
  const doc  = new jspdf.jsPDF({ orientation:'portrait', unit:'mm', format:'letter' });
  const PW   = 215.9; // letter width mm
  const COL1 = 14, COL2 = 130;
  const fmt2 = v => (parseFloat(v)||0).toLocaleString('es-DO',{minimumFractionDigits:2,maximumFractionDigits:2});
  const NAVY = [0,51,102], GOLD = [232,160,32], WHITE = [255,255,255];

  // ── CABECERA ─────────────────────────────────────────────────────────
  doc.setFillColor(...NAVY); doc.rect(0,0,PW,36,'F');

  // Logo
  try { doc.addImage(logoB64,'PNG',14,6,28,24); } catch(e){}

  // Nombre empresa
  doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(...WHITE);
  doc.text('TRANSPORTE EMPRESARIAL AMALFI, SRL',52,13);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(180,200,230);
  doc.text('RNC: 1-31-07998-9  ·  nomina@amalfi.com', 52, 19);

  // Badge comprobante
  doc.setFillColor(...GOLD); doc.roundedRect(COL2,8,67,20,3,3,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...NAVY);
  doc.text('COMPROBANTE DE PAGO', COL2+33.5, 15.5, {align:'center'});
  doc.setFontSize(8);
  doc.text(periodLabel || '—', COL2+33.5, 21, {align:'center'});
  doc.text(String(periodYear || 2026), COL2+33.5, 26.5, {align:'center'});

  let y = 44;

  // ── DATOS DEL EMPLEADO ────────────────────────────────────────────────
  doc.setFillColor(240,245,252); doc.rect(14,y,187,22,'F');
  doc.setDrawColor(210,220,235); doc.setLineWidth(.3); doc.rect(14,y,187,22,'S');

  doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(...NAVY);
  doc.text(emp.name, 20, y+7);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(80,100,130);

  const col1x = 20, col2x = 90, col3x = 155;
  doc.text(`Cargo: ${emp.position||'—'}`,   col1x, y+13);
  doc.text(`Cédula: ${emp.cedula||'—'}`,     col1x, y+18);
  doc.text(`Tipo pago: ${emp.payFrequency==='quincenal'?'Quincenal':'Mensual'}`, col2x, y+13);
  doc.text(`Período: ${periodLabel||'—'}`,    col2x, y+18);
  doc.text(`NSS: ${emp.nss||'—'}`,            col3x, y+13);
  doc.text(`ARS: ${(emp.ars||'—').substring(0,25)}`, col3x, y+18);
  y += 28;

  // ── RESUMEN DEL PAGO (4 cajas) ────────────────────────────────────────
  const COLORS4 = [[0,51,102],[22,163,74],[220,38,38],[124,58,237]];
  const LABELS4 = ['Salario Base','Total Neto a Pagar','Total Descuentos','Costo Empresa'];
  const VALUES4 = [calc.periodSalary, calc.totalAPagar, calc.totalDeductions, calc.costEmpresa||0];
  const BW = 44, BH = 16, BG = 3;
  LABELS4.forEach((lbl,i)=>{
    const bx = 14 + i*(BW+BG);
    doc.setFillColor(...COLORS4[i]); doc.roundedRect(bx,y,BW,BH,2,2,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(6.5); doc.setTextColor(...WHITE);
    doc.text(lbl.toUpperCase(), bx+BW/2, y+5, {align:'center'});
    doc.setFontSize(9.5);
    doc.text('RD$ '+fmt2(VALUES4[i]), bx+BW/2, y+12, {align:'center'});
  });
  y += BH + 6;

  // ── TABLAS INGRESOS / DEDUCCIONES ────────────────────────────────────
  const MID = PW/2 + 4;

  // Helper: draw a mini-table
  function drawTable(title, rows, totLabel, totVal, startX, tableW) {
    // Section title
    doc.setFillColor(...NAVY); doc.rect(startX, y, tableW, 6.5,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...WHITE);
    doc.text(title, startX+tableW/2, y+4.5, {align:'center'});
    let ty = y + 6.5;

    // Header row
    doc.setFillColor(230,236,248); doc.rect(startX,ty,tableW,5.5,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(50,70,100);
    doc.text('Concepto', startX+2, ty+3.8);
    doc.text('Monto (RD$)', startX+tableW-2, ty+3.8, {align:'right'});
    ty += 5.5;

    rows.forEach((r,i)=>{
      if(i%2===0){doc.setFillColor(250,252,255);doc.rect(startX,ty,tableW,5.5,'F');}
      doc.setDrawColor(220,228,240); doc.setLineWidth(.12);
      doc.rect(startX,ty,tableW,5.5);
      doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(30);
      doc.text(r.label.substring(0,30), startX+2, ty+3.8);
      doc.setFont('helvetica','bold'); doc.setTextColor(0,60,120);
      doc.text(fmt2(r.val), startX+tableW-2, ty+3.8, {align:'right'});
      doc.setFont('helvetica','normal'); doc.setTextColor(0);
      ty += 5.5;
    });

    // Total row
    doc.setFillColor(...NAVY); doc.rect(startX,ty,tableW,6.5,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...WHITE);
    doc.text(totLabel, startX+2, ty+4.5);
    doc.text(fmt2(totVal), startX+tableW-2, ty+4.5, {align:'right'});
    return ty + 6.5;
  }

  const INCOME_LABELS = {
    comision:'Comisión', vacaciones:'Vacaciones',
    prima_nocturna:'Prima Nocturna', horas_extra_35:'H. Extra 35%',
    horas_extra_100:'H. Extra 100%', bonificacion:'Bonificación',
    transporte_extra:'Transporte Extra', regalia_pascual:'Regalía Pascual',
    preaviso:'Preaviso', cesantia:'Cesantía', otros_ingresos:'Otros Ingresos'
  };
  const DEDUCT_LABELS = {
    inasistencia:'Inasistencia', licencia_no_remun:'Lic. no Remunerada',
    licencia_medica:'Lic. Médica', pension_aliment:'Pensión Alimenticia',
    aporte_voluntario:'Ap. Voluntario AFP', prestamo:'Préstamo Empresa',
    otros_descuentos:'Otros Descuentos'
  };

  // Ingresos rows
  const incRows = [
    { label:'Salario Base', val: calc.periodSalary },
    ...(calc.incomesExtra||[]).map(i=>({ label: INCOME_LABELS[i.type]||i.type, val: i.amount||0 }))
  ];
  const dedRows = [
    { label:'AFP (2.87%)',    val: calc.afpWorker },
    { label:'SFS (3.04%)',    val: calc.sfsWorker },
    { label:'ISR Retenido',   val: calc.isrPeriodo||0 },
    ...(calc.deductionsExtra||[]).map(d=>({ label: DEDUCT_LABELS[d.type]||d.type, val: d.amount||0 }))
  ];

  const TBLW = (PW - 28 - 8) / 2;
  const savedY = y;
  const endInc = drawTable('INGRESOS', incRows, 'TOTAL INGRESOS', calc.periodSalary + (calc.incomesExtra||[]).reduce((s,i)=>s+(i.amount||0),0), 14, TBLW);
  y = savedY;
  const endDed = drawTable('DEDUCCIONES', dedRows, 'TOTAL DESCUENTOS', calc.totalDeductions, 14+TBLW+8, TBLW);
  y = Math.max(endInc, endDed) + 6;

  // ── TOTAL NETO ────────────────────────────────────────────────────────
  doc.setFillColor(22,163,74); doc.roundedRect(14,y,187,12,3,3,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(...WHITE);
  doc.text('TOTAL NETO A PAGAR:', 20, y+8.5);
  doc.text('RD$ '+fmt2(calc.totalAPagar), 196, y+8.5, {align:'right'});
  y += 18;

  // ── PIE ───────────────────────────────────────────────────────────────
  doc.setDrawColor(180,200,220); doc.setLineWidth(.3); doc.line(14,y,196,y);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(120);
  doc.text(`Generado: ${new Date().toLocaleDateString('es-DO',{day:'2-digit',month:'2-digit',year:'numeric'})}`,14,y+5);
  doc.text('TRANSPORTE EMPRESARIAL AMALFI, SRL  ·  RNC: 1-31-07998-9  ·  Sistema de Nómina v2.0',14,y+10);
  doc.setFontSize(9); doc.setTextColor(160);
  doc.text('Este documento es un comprobante de pago generado electrónicamente. Período fiscal 2026.',14,y+15);

  // ── GUARDAR ───────────────────────────────────────────────────────────
  const slug = emp.name.replace(/\s+/g,'_').toUpperCase();
  doc.save(`Recibo_${slug}_${(periodLabel||'').replace(/\s/g,'_')}_${periodYear||2026}.pdf`);
}

function Reportes({ employees, periods, deletePeriod }) {
  const [tssTab, setTssTab] = React.useState("resumen");

  const rows = employees.map(e => ({ emp: e, calc: calcPayroll(e,[],[]) }));
  const T = rows.reduce((s,{calc}) => ({
    afpW:s.afpW+calc.afpWorker, sfsW:s.sfsW+calc.sfsWorker, isr:s.isr+calc.isrPeriodo,
    afpE:s.afpE+calc.afpEmpresa, sfsE:s.sfsE+calc.sfsEmpresa, srl:s.srl+calc.srlEmpresa, inf:s.inf+calc.infotep,
    n:s.n+calc.totalAPagar, c:s.c+calc.costEmpresa
  }), {afpW:0,sfsW:0,isr:0,afpE:0,sfsE:0,srl:0,inf:0,n:0,c:0});

  // Exportar planilla TSS como CSV
  const exportTSS = (selectedPeriod) => {
    const p = selectedPeriod || { period: { label: "General", year: 2026 }, rows: periods.flatMap(p=>p.rows) };
    const data = p.rows || rows;
    const headers = [
      "No.","Cédula","Nombre Completo","Cargo","Tipo Contrato",
      "Salario Mensual","Salario Período",
      "AFP Trabajador (2.87%)","SFS Trabajador (3.04%)","ISR Período",
      "Total Descuentos Empleado","Salario Neto",
      "AFP Empresa (7.10%)","SFS Empresa (7.09%)","SRL Empresa (~1.1%)","INFOTEP (1%)",
      "Total Aportes Empresa","Costo Total"
    ];
    const csvRows = data.map(({emp,calc},i) => {
      const e = emp || calc;
      const c = calc;
      return [
        i+1, emp.cedula, emp.name, emp.position, emp.contractType,
        emp.salary.toFixed(2), c.periodSalary.toFixed(2),
        c.afpWorker.toFixed(2), c.sfsWorker.toFixed(2), c.isrPeriodo.toFixed(2),
        c.totalDeductions.toFixed(2), c.totalAPagar.toFixed(2),
        c.afpEmpresa.toFixed(2), c.sfsEmpresa.toFixed(2), c.srlEmpresa.toFixed(2), c.infotep.toFixed(2),
        (c.afpEmpresa+c.sfsEmpresa+c.srlEmpresa+c.infotep).toFixed(2),
        c.costEmpresa.toFixed(2)
      ].join(",");
    });
    const totRow = [
      "TOTAL","","","","","",
      data.reduce((s,r)=>s+r.calc.periodSalary,0).toFixed(2),
      data.reduce((s,r)=>s+r.calc.afpWorker,0).toFixed(2),
      data.reduce((s,r)=>s+r.calc.sfsWorker,0).toFixed(2),
      data.reduce((s,r)=>s+r.calc.isrPeriodo,0).toFixed(2),
      data.reduce((s,r)=>s+r.calc.totalDeductions,0).toFixed(2),
      data.reduce((s,r)=>s+r.calc.totalAPagar,0).toFixed(2),
      data.reduce((s,r)=>s+r.calc.afpEmpresa,0).toFixed(2),
      data.reduce((s,r)=>s+r.calc.sfsEmpresa,0).toFixed(2),
      data.reduce((s,r)=>s+r.calc.srlEmpresa,0).toFixed(2),
      data.reduce((s,r)=>s+r.calc.infotep,0).toFixed(2),
      data.reduce((s,r)=>s+r.calc.afpEmpresa+r.calc.sfsEmpresa+r.calc.srlEmpresa+r.calc.infotep,0).toFixed(2),
      data.reduce((s,r)=>s+r.calc.costEmpresa,0).toFixed(2),
    ].join(",");
    const meta = [
      `# PLANILLA TSS - TRANSPORTE AMALFI`,
      `# Período: ${p.period?.label} ${p.period?.year}`,
      `# Generado: ${new Date().toLocaleString("es-DO")}`,
      `# Empleados: ${data.length}`,
      `# TSS Resolución 01-2025 | AFP 2.87%/7.10% | SFS 3.04%/7.09% | SMN: RD$23,223.00`,
      "",
    ].join("\n");
    const csv = meta + headers.join(",") + "\n" + csvRows.join("\n") + "\n" + totRow;
    const blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const d = new Date();
    a.href=url;
    a.download=`planilla-tss-amalfi-${p.period?.year||d.getFullYear()}-${String(p.period?.month||d.getMonth()+1).padStart(2,"0")}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  };

  // ── Generar Archivo AM (Autodeterminación Mensual) TSS ──────────────────
  const generateAMTxt = (selectedPeriod) => {
    const RNC = "131079989";
    const CLAVE_NOM = "001";
    const pd = selectedPeriod
      ? { month: selectedPeriod.period?.month, year: selectedPeriod.period?.year, rows: selectedPeriod.rows }
      : { month: new Date().getMonth()+1, year: new Date().getFullYear(),
          rows: employees.map(e=>({emp:e,calc:calcPayroll(e,[],[])})) };
    const mes  = String(pd.month||new Date().getMonth()+1).padStart(2,"0");
    const anio = String(pd.year||new Date().getFullYear());
    const per  = mes + anio;

    const padL = (s,n) => String(s||"").substring(0,n).padEnd(n," ");
    const padR = (s,n) => String(s||"").substring(0,n).padStart(n," ");
    const padZ = (s,n) => String(s||"").padStart(n,"0").substring(0,n);
    const fSal = (v) => {
      const n = parseFloat(v)||0;
      const p = n.toFixed(2).split(".");
      return p[0].padStart(13,"0") + "." + p[1];
    };
    const fIE  = (cd,v) => cd + fSal(v);

    const parseName = (full) => {
      const pts = (full||"").trim().split(/\s+/);
      if(pts.length <= 1) return {nom:full||"", ap1:"", ap2:""};
      if(pts.length === 2) return {nom:pts[0], ap1:pts[1], ap2:""};
      if(pts.length === 3) return {nom:pts[0], ap1:pts[1], ap2:pts[2]};
      return {nom:pts.slice(0,2).join(" "), ap1:pts[2]||"", ap2:pts.slice(3).join(" ")||""};
    };

    const lines = [];
    // ENCABEZADO
    lines.push("E" + "AM" + padR(RNC,11) + padZ(per,6));

    // DETALLE por empleado
    for(const {emp,calc} of pd.rows) {
      if(!emp||!emp.cedula) continue;
      const {nom,ap1,ap2} = parseName(emp.name);
      let fechaNac = "00000000";
      if(emp.birthDate){const[y,m,d]=emp.birthDate.split("-");if(y&&m&&d)fechaNac=d.padStart(2,"0")+m.padStart(2,"0")+y;}
      const salSS   = emp.salary;
      const extras  = calc.incomesExtra||[];
      const deds    = calc.deductionsExtra||[];
      const regalia = extras.find(i=>i.type==="regalia_pascual")?.amount||0;
      const prev    = extras.find(i=>i.type==="preaviso")?.amount||0;
      const ces     = extras.find(i=>i.type==="cesantia")?.amount||0;
      const prevCes = prev+ces;
      const pension = deds.filter(d=>d.type==="pension_aliment").reduce((s,d)=>s+d.amount,0);
      const otrasISR= extras.filter(i=>!["regalia_pascual","preaviso","cesantia"].includes(i.type)).reduce((s,i)=>s+i.amount,0);
      const totEx   = regalia+prevCes;
      const ced     = (emp.cedula||"").replace(/[-\s]/g,"");
      let d="";
      d+="D";
      d+=padZ(CLAVE_NOM,3);
      d+="C";
      d+=padL(ced,25);
      d+=padL(nom,50);
      d+=padL(ap1,40);
      d+=padL(ap2,40);
      d+=(emp.gender||"M").charAt(0).toUpperCase();
      d+=padZ(fechaNac,8);
      d+=fSal(salSS);
      d+=fSal(0);
      d+=fSal(0);
      d+=fSal(otrasISR);
      d+=padR("",11);
      d+=fSal(0);
      d+=fSal(totEx>0?totEx:0);
      d+=fSal(0);
      d+=fSal(0);
      d+="0001";
      d+=fIE("01",regalia);
      d+=fIE("02",prevCes);
      d+=fIE("03",pension);
      lines.push(d);
    }
    // SUMARIO
    lines.push("S"+padZ(String(lines.length+1),6));
    const blob = new Blob([lines.join("\n")],{type:"text/plain;charset=utf-8"});
    const url2 = URL.createObjectURL(blob);
    const a2 = document.createElement("a");
    a2.href=url2; a2.download=`AM_${RNC}_${per}.txt`;
    document.body.appendChild(a2); a2.click();
    document.body.removeChild(a2); URL.revokeObjectURL(url2);
  };

  return (
    <>
      <div className="fjb mb3">

      {/* ── TAB: RESUMEN ── */}
      {tssTab === "resumen" && (

          <div className="g4 mb4">
            {[
              {t:"AFP Trabajadores",v:T.afpW,p:"2.87%",c:"#003366"},

// FORMULARIOS DGII (IR-1 · Anexo A · Anexo B) — jsPDF
// ═══════════════════════════════════════════════════════════════════════════
function Formularios({ employees, periods }) {
  const [selEmp,  setSelEmp]  = useState(null);
  const [selPer,  setSelPer]  = useState(null);
  const [loading, setLoading] = useState(false);
  const ANNO = 2026;

  function getCalc(emp) {
    if (selPer) {
      const row = (selPer.rows || []).find(r => r.empId === emp.id || r.empId === String(emp.id));
      if (row) return row;
    }
    return calcPayroll(emp, [], []);
  }

  // ── jsPDF helpers ──────────────────────────────────────────────────────
  function mkDoc() {
    const doc = new jspdf.jsPDF({ orientation:'portrait', unit:'mm', format:'letter' });
    doc.setFont('helvetica'); return doc;
  }
  function hdgii(doc, subtitle, y=14) {
    doc.setFillColor(0,100,50); doc.rect(14,y,183,7,'F');
    doc.setFontSize(9); doc.setTextColor(255,255,255); doc.setFont('helvetica','bold');
    doc.text('DIRECCIÓN GENERAL DE IMPUESTOS INTERNOS',105,y+5,{align:'center'});
    doc.setDrawColor(0,100,50); doc.setLineWidth(.4);
    doc.rect(14,y+8,183,7);
    doc.setTextColor(0); doc.setFontSize(8);
    doc.text(subtitle,105,y+13,{align:'center'});
    doc.setFontSize(7); doc.text(`AÑO FISCAL: ${ANNO}`,160,y+13);
    doc.setFont('helvetica','normal'); return y+17;
  }
  function lbox(doc,x,y,w,h,lbl,val) {
    doc.setDrawColor(180); doc.setLineWidth(.2); doc.rect(x,y,w,h);
    doc.setFontSize(6); doc.setTextColor(120); doc.text(lbl,x+1.5,y+3);
    doc.setFontSize(8); doc.setTextColor(0); doc.setFont('helvetica','bold');
    doc.text(String(val||''),x+1.5,y+h-1.5);
    doc.setFont('helvetica','normal');
  }
  function trow(doc,y,num,lbl,val,shade=false) {
    if(shade){doc.setFillColor(244,250,244);doc.rect(14,y,183,5,'F');}
    doc.setDrawColor(200); doc.setLineWidth(.12); doc.rect(14,y,183,5);
    doc.setFontSize(7); doc.setTextColor(90); doc.text(String(num),16,y+3.5);
    doc.setTextColor(0); doc.text(lbl,22,y+3.5);
    doc.setFont('helvetica','bold'); doc.setTextColor(0,60,120);
    doc.text(val,194,y+3.5,{align:'right'});
    doc.setFont('helvetica','normal'); doc.setTextColor(0);
  }
  function secTitle(doc,y,ttl) {
    doc.setFillColor(0,51,102); doc.rect(14,y,183,5.5,'F');
    doc.setFontSize(8); doc.setTextColor(255,255,255); doc.setFont('helvetica','bold');
    doc.text(ttl,16,y+3.8); doc.setFont('helvetica','normal'); doc.setTextColor(0);
    return y+5.5;
  }
  function footer(doc,emp) {
    const ph = doc.internal.pageSize.getHeight();
    doc.setFontSize(7); doc.setTextColor(150);
    doc.text(`Generado: ${new Date().toLocaleDateString('es-DO')} · TRANSPORTE AMALFI, S.R.L. · RNC: 131-07998-9`,105,ph-8,{align:'center'});
    doc.text(`${emp.name} · Cédula: ${emp.cedula}`,105,ph-4,{align:'center'});
  }
  const n2 = v => (parseFloat(v)||0).toFixed(2);

  // ── IR-1 ───────────────────────────────────────────────────────────────
  function genIR1(emp, calc) {
    const doc = mkDoc(); let y = hdgii(doc,'DECLARACIÓN JURADA DE IMPUESTO SOBRE LA RENTA · IR-1  (Versión 2018)');
    // Datos declarante
    y = secTitle(doc,y,'I. DATOS DEL DECLARANTE');
    lbox(doc,14,y,48,9,'RNC/CÉDULA',emp.cedula);
    lbox(doc,62,y,78,9,'NOMBRE(S) Y APELLIDO(S)',emp.name);
    lbox(doc,140,y,32,9,'NOMBRE COMERCIAL','TRANSPORTE AMALFI');
    lbox(doc,172,y,25,9,'AÑO FISCAL',String(ANNO));
    y+=9;
    lbox(doc,14,y,38,9,'TELÉFONO','(809) 000-0000');
    lbox(doc,52,y,55,9,'CORREO ELECTRÓNICO','nomina@amalfi.com');
    lbox(doc,107,y,45,9,'TIPO DE DECLARACIÓN','NORMAL');
    lbox(doc,152,y,45,9,'CONTAB. ORGANIZADA','NO'); y+=12;

    // Renta neta imponible
    y = secTitle(doc,y,'II. RENTA NETA IMPONIBLE');
    const freq = emp.payFrequency === 'quincenal' ? 24 : 12;
    const salAnual  = (calc.periodSalary || calc.salary/2) * freq;
    const ssAnual   = ((calc.afpWorker||0) + (calc.sfsWorker||0)) * freq;
    const isrAnual  = (calc.isrPeriodo||0) * freq;
    const cotAnual  = (calc.cotizableAnual) || ((calc.cotizable||0) * freq) || (salAnual - ssAnual);
    const exencion  = 416220;
    const rnImpon   = Math.max(0, cotAnual - exencion);
    const rows2 = [
      ['A','INGRESOS (Total Ingresos del Anexo B)',n2(salAnual)],
      ['1','BENEFICIO O PÉRDIDA NETA ANTES DEL ISR (Viene del Anexo B Casilla 67)',n2(cotAnual)],
      ['2','GASTOS NO ADMITIDOS','0.00'],
      ['3','INGRESOS EXENTOS – Seguridad Social (AFP + SFS)',n2(ssAnual)],
      ['4','INGRESOS POR DIVIDENDOS','0.00'],
      ['5','RENTA NETA O PÉRDIDA  [Casillas 1+2−3−4]',n2(cotAnual)],
      ['6','EXENCIÓN CONTRIBUTIVA  (Solo sin costos/gastos)','416,220.00'],
      ['7','EXENCIÓN GASTOS EN EDUCACIÓN  (Máx 10% casillas 5-6 y 25% exención)','0.00'],
      ['8','GANANCIA DE CAPITAL POR VENTAS DE ACCIONES','0.00'],
      ['9','GANANCIA DE CAPITAL POR VENTA/APORTE DE INMUEBLES','0.00'],
      ['10','RENTA NETA IMPONIBLE  [Casillas 5−6−7+8+9]',n2(rnImpon)],
    ];
    rows2.forEach(([num,lbl,val],i)=>{trow(doc,y,num,lbl,val,i%2===0);y+=5;});
    y+=2;

    // Liquidación
    y = secTitle(doc,y,'III. LIQUIDACIÓN');
    const rows3 = [
      ['11','IMPUESTO LIQUIDADO  (Aplica tasa sobre Casilla 10)',n2(isrAnual)],
      ['12','ANTICIPOS PAGADOS','0.00'],
      ['13','RETENCIONES  (Viene de Casilla 28 del Anexo A)',n2(isrAnual)],
      ['14','OTROS PAGOS','0.00'],
      ['15','SALDO A FAVOR EJERCICIO ANTERIOR','0.00'],
      ['16','DIFERENCIA A PAGAR  [Casillas 11−12−13−14−15 si positivo]','0.00'],
      ['17','SALDO A FAVOR  [Casillas 11−12−13−14−15 si negativo]','0.00'],
      ['18','MORA EN DECLARACIÓN TARDÍA','0.00'],
      ['19','MORA EN ANTICIPOS NO PAGADOS','0.00'],
      ['20','INTERÉS INDEMNIZATORIO','0.00'],
      ['21','INTERÉS INDEMNIZATORIO POR ANTICIPOS NO PAGADOS','0.00'],
      ['22','TOTAL A PAGAR  [Sumar Casillas 16+18+19+20+21]','0.00'],
    ];
    rows3.forEach(([num,lbl,val],i)=>{trow(doc,y,num,lbl,val,i%2===0);y+=5;});
    y+=4;

    // Juramento
    doc.setDrawColor(150); doc.setLineWidth(.3);
    doc.rect(14,y,88,30); doc.rect(102,y,95,30);
    doc.setFontSize(8); doc.setFont('helvetica','bold');
    doc.text('V. JURAMENTO DEL DECLARANTE',58,y+6,{align:'center'});
    doc.setFont('helvetica','normal'); doc.setFontSize(7);
    doc.text(`Yo, ${emp.name}`,16,y+11);
    doc.text('en calidad de Persona Física asalariada',16,y+15);
    doc.text('afirmo bajo juramento que los datos consignados',16,y+19);
    doc.text('son correctos y completos.',16,y+23);
    doc.text('Fecha: _____________________________',16,y+28);
    doc.setFont('helvetica','bold');
    doc.text('VI. AUTORIZACIÓN DE PRESENTACIÓN',149.5,y+6,{align:'center'});
    doc.setFont('helvetica','normal');
    doc.text('Apellidos: ________________________________',104,y+13);
    doc.text('Nombres:  ________________________________',104,y+19);
    doc.text('Cédula:   ________________________________',104,y+25);

    footer(doc,emp); return doc;
  }

  // ── ANEXO A ────────────────────────────────────────────────────────────
  function genAnexoA(emp, calc) {
    const doc = mkDoc(); let y = hdgii(doc,'DATOS COMPLEMENTARIOS · ANEXO A  (Versión 2018)');
    y = secTitle(doc,y,'DATOS PERSONALES DECLARANTE');

//  CALCULADORA DE PRESTACIONES LABORALES (Ley 16-92 / Código de Trabajo RD)
// ═══════════════════════════════════════════════════════════════════════════

function Prestaciones({ employees }) {
  const [step, setStep]         = useState(1); // 1=datos, 2=resultado
  const [empId, setEmpId]       = useState('');
  const [nombre, setNombre]     = useState('');
  const [cedula, setCedula]     = useState('');
  const [salario, setSalario]   = useState('');
  const [tipo, setTipo]         = useState('despido'); // despido | renuncia | mutuo
  const [fechaIni, setFechaIni] = useState('');
  const [fechaFin, setFechaFin] = useState('');
  const [vacPend, setVacPend]   = useState('0');
  const [incNavidad, setIncNav] = useState(true);
  const [resultado, setResult]  = useState(null);

  // Al seleccionar empleado del listado
  function onSelectEmp(id) {
    setEmpId(id);
    const emp = employees.find(e => String(e.id) === id);
    if (!emp) return;
    setNombre(emp.name || '');
    setCedula(emp.cedula || '');
    setSalario(String(emp.salary || ''));
  }

  function rd(n) { return 'RD$' + Number(n).toLocaleString('es-DO', {minimumFractionDigits:2,maximumFractionDigits:2}); }

  function calcular() {
    const sal   = parseFloat(salario) || 0;
    const diario = sal / 23.83;
    const ini   = new Date(fechaIni + 'T12:00:00');
    const fin   = new Date(fechaFin + 'T12:00:00');
    const diffMs = fin - ini;
    const diffDays = Math.floor(diffMs / 86400000);
    const totalMonths = diffDays / 30.4375;
    const years = diffDays / 365.25;

    // Tiempo laborado legible
    let yrs = Math.floor(years);
    let remDays = diffDays - yrs * 365.25;
    let mths = Math.floor(remDays / 30.4375);
    let dys  = Math.round(remDays - mths * 30.4375);
    if (dys < 0) { mths--; dys += 30; }
    let tiempoStr = '';
    if (yrs > 0) tiempoStr += yrs + ' año' + (yrs > 1 ? 's' : '');
    if (mths > 0) tiempoStr += (tiempoStr ? ', ' : '') + mths + ' mes' + (mths > 1 ? 'es' : '');
    if (dys > 0)  tiempoStr += (tiempoStr ? ' y ' : '') + dys + ' día' + (dys > 1 ? 's' : '');
    if (!tiempoStr) tiempoStr = '0 días';

    // Preaviso — solo en despido o mutuo
    let pravisoDias = 0;
    if (tipo !== 'renuncia' && tipo !== 'despido_just') {
      if      (totalMonths >= 12) pravisoDias = 28;
      else if (totalMonths >= 6)  pravisoDias = 14;
      else if (totalMonths >= 3)  pravisoDias = 7;
    }
    const preaviso = pravisoDias * diario;

    // Cesantía — solo en despido o mutuo
    let cesantiaDias = 0;
    if (tipo !== 'renuncia' && tipo !== 'despido_just') {
      if      (totalMonths < 3)  cesantiaDias = 0;
      else if (totalMonths < 6)  cesantiaDias = 6;
      else if (totalMonths < 12) cesantiaDias = 13;
      else {
        const rate = years < 2 ? 21 : years < 3 ? 23 : years < 4 ? 24 : years < 5 ? 25 : 23;
        cesantiaDias = Math.round(rate * years);
      }
    }
    const cesantia = cesantiaDias * diario;

    // Vacaciones no disfrutadas
    const vacDias = parseFloat(vacPend) || 0;
    const vacaciones = vacDias * diario;

    // Salario de Navidad proporcional
    let navidad = 0;
    if (incNavidad) {
      const mesFinStr = fechaFin ? fechaFin.substring(5, 7) : '12';
      const mesFin = parseInt(mesFinStr);
      navidad = (sal / 12) * mesFin;
    }

    const subTotal  = preaviso + cesantia + vacaciones;
    const total     = subTotal + navidad;

    setResult({
      nombre, cedula,
      fechaIni: ini.toLocaleDateString('es-DO',{day:'2-digit',month:'2-digit',year:'numeric'}),
      fechaFin: fin.toLocaleDateString('es-DO',{day:'2-digit',month:'2-digit',year:'numeric'}),
      tiempoStr,
      salMensual: sal,
      salDiario: diario,
      tipo,
      pravisoDias, preaviso,
      cesantiaDias, cesantia,
      vacDias, vacaciones,
      navidad,
      subTotal, total,
      fecha: new Date().toLocaleDateString('es-DO',{day:'2-digit',month:'2-digit',year:'numeric'})
    });
    setStep(2);
  }

  function descargarPDF() {
    const r = resultado;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit:'mm', format:'a4' });
    const W = 210, M = 25;
    let y = 20;

    // Logo si existe
    try { doc.addImage(LOGO_TEA, 'PNG', W/2-15, y, 30, 14, undefined, 'FAST'); y += 18; } catch(e) { y += 4; }

    doc.setFont('helvetica','bold');
    doc.setFontSize(16); doc.setTextColor(0,34,102);
    doc.text('República Dominicana', W/2, y, {align:'center'}); y += 7;
    doc.setFontSize(12); doc.text('TRANSPORTE EMPRESARIAL AMALFI', W/2, y, {align:'center'}); y += 5;
    doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(80,80,80);
    doc.text('Cálculo de Prestaciones Laborales y Derechos Adquiridos', W/2, y, {align:'center'}); y += 10;

    // Línea
    doc.setDrawColor(0,34,102); doc.setLineWidth(0.5);
    doc.line(M, y, W-M, y); y += 6;

    // Datos
    doc.setFontSize(10); doc.setTextColor(0,0,0);
    const col1 = M, col2 = W/2+5;
    const filas = [
      ['Cédula:', r.cedula || '—', 'Tipo de Terminación:', r.tipo === 'despido' ? 'Desahucio (despido s/causa)' : r.tipo === 'despido_just' ? 'Despido Justificado (Art. 88)' : r.tipo === 'renuncia' ? 'Renuncia Voluntaria' : 'Mutuo Acuerdo'],
      ['Nombre:', r.nombre, 'Fecha de Ingreso:', r.fechaIni],
      ['Empleador:', 'TRANSPORTE EMPRESARIAL AMALFI', 'Fecha de Salida:', r.fechaFin],
      ['Tiempo Laborado:', r.tiempoStr, 'Salario Mensual:', 'RD$' + r.salMensual.toLocaleString('es-DO',{minimumFractionDigits:2})],
      ['Sal. Promedio Diario:', 'RD$' + r.salDiario.toFixed(2), '', ''],
    ];
    filas.forEach(([l1,v1,l2,v2]) => {
      doc.setFont('helvetica','bold'); doc.text(l1, col1, y);
      doc.setFont('helvetica','normal'); doc.text(v1, col1+38, y);
      if (l2) { doc.setFont('helvetica','bold'); doc.text(l2, col2, y); }
      if (v2) { doc.setFont('helvetica','normal'); doc.text(v2, col2+38, y); }
      y += 6;
    });

    y += 3; doc.line(M, y, W-M, y); y += 7;

//  CALCULADORA SALARIO DE NAVIDAD — Art. 219 Código de Trabajo RD
// ═══════════════════════════════════════════════════════════════════════════
function SalarioNavidad({ employees }) {
  const anio = new Date().getFullYear();
  const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                 'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  // mesesEmp: { [empId]: { m1..m12: salario } }
  const [mesesEmp, setMesesEmp] = useState(() => {
    const init = {};
    employees.forEach(e => {
      const row = {};
      for (let i = 1; i <= 12; i++) row['m'+i] = e.salary || 0;
      init[String(e.id)] = row;
    });
    return init;
  });
  const [mostrarDetalle, setMostrarDetalle] = useState(null); // empId con detalle abierto
  const [pdfLoading, setPdfLoading] = useState(false);

  // Recalcular cuando cambian employees
  React.useEffect(() => {
    setMesesEmp(prev => {
      const next = { ...prev };
      employees.forEach(e => {
        if (!next[String(e.id)]) {
          const row = {};
          for (let i = 1; i <= 12; i++) row['m'+i] = e.salary || 0;
          next[String(e.id)] = row;
        }
      });
      return next;
    });
  }, [employees]);

  function calcNavidad(id) {
    const row = mesesEmp[String(id)] || {};
    const suma = Object.values(row).reduce((a,b) => a + (parseFloat(b)||0), 0);
    return suma / 12;
  }

  function setMes(id, mes, valor) {
    setMesesEmp(prev => ({
      ...prev,
      [String(id)]: { ...prev[String(id)], [mes]: parseFloat(valor) || 0 }
    }));
  }

  function aplicarMismoSalario(id) {
    const sal = employees.find(e => String(e.id) === String(id))?.salary || 0;
    const row = {};
    for (let i = 1; i <= 12; i++) row['m'+i] = sal;
    setMesesEmp(prev => ({ ...prev, [String(id)]: row }));
  }

  const totalNavidad = employees.reduce((s, e) => s + calcNavidad(e.id), 0);
  const rd = n => 'RD$' + Number(n).toLocaleString('es-DO', {minimumFractionDigits:2, maximumFractionDigits:2});

  function descargarPDF() {
    setPdfLoading(true);
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit:'mm', format:'a4' });
      const W = 210, M = 15;
      let y = 18;

      // Logo
      try { doc.addImage(LOGO_TEA,'PNG', W/2-12, y, 24,12); y += 16; } catch(e) { y += 4; }

      doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(0,34,102);
      doc.text('TRANSPORTE EMPRESARIAL AMALFI', W/2, y, {align:'center'}); y += 6;
      doc.setFontSize(11); doc.setFont('helvetica','normal'); doc.setTextColor(60,60,60);
      doc.text('Planilla de Salario de Navidad (Regalía Pascual)', W/2, y, {align:'center'}); y += 5;
      doc.setFontSize(9);
      doc.text(`Año ${anio}  ·  Art. 219 del Código de Trabajo  ·  Pago límite: 20 de Diciembre ${anio}`, W/2, y, {align:'center'}); y += 8;

      doc.setDrawColor(0,34,102); doc.setLineWidth(0.6);
      doc.line(M, y, W-M, y); y += 6;

      // Encabezados tabla
      const cols = [M, M+8, M+78, M+118, M+148, M+172];
      doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(255,255,255);
      doc.setFillColor(0,34,102);
      doc.rect(M, y-4, W-2*M, 8, 'F');
      doc.text('#', cols[0]+1, y); 
      doc.text('Empleado', cols[1], y);
      doc.text('Cédula', cols[2], y);
      doc.text('Sal. Mensual', cols[3], y);
      doc.text('Suma Año', cols[4], y);
      doc.text('NAVIDAD', cols[5], y);
      y += 6;

      doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(0,0,0);
      const sorted = [...employees].sort((a,b) => a.name.localeCompare(b.name));
      sorted.forEach((emp, i) => {
        const nav   = calcNavidad(emp.id);
        const row   = mesesEmp[String(emp.id)] || {};
        const suma  = Object.values(row).reduce((a,b)=>a+(parseFloat(b)||0),0);
        if (i % 2 === 0) { doc.setFillColor(245,248,255); doc.rect(M, y-3.5, W-2*M, 7, 'F'); }
        doc.text(String(i+1), cols[0]+2, y, {align:'right'});
        doc.text(emp.name.length > 30 ? emp.name.substring(0,28)+'…' : emp.name, cols[1], y);
        doc.text(emp.cedula || '—', cols[2], y);
        doc.text(rd(emp.salary||0), cols[3], y);
        doc.text(rd(suma), cols[4], y);
        doc.setFont('helvetica','bold'); doc.setTextColor(0,34,102);
        doc.text(rd(nav), cols[5], y);
        doc.setFont('helvetica','normal'); doc.setTextColor(0,0,0);
        y += 7;
        if (y > 270) { doc.addPage(); y = 20; }
      });

      // Total
      y += 2;
      doc.setFillColor(0,34,102); doc.rect(M, y-4, W-2*M, 9, 'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(255,255,255);
      doc.text('TOTAL A PAGAR POR SALARIO DE NAVIDAD:', cols[1], y);
      doc.text(rd(totalNavidad), cols[5], y);
      y += 14;

      // Firmas
      doc.setTextColor(0,0,0); doc.setFontSize(9); doc.setFont('helvetica','normal');
      doc.line(M, y, M+60, y); doc.line(W-M-60, y, W-M, y);
      y += 5;
      doc.text('Gerencia / Administración', M+5, y);
      doc.text('Contabilidad', W-M-45, y);

      doc.setFontSize(7); doc.setTextColor(130,130,130);
      doc.text(`RNC: 131-07998-9  ·  Generado: ${new Date().toLocaleDateString('es-DO')}  ·  Documento informativo interno`, W/2, 288, {align:'center'});

      doc.save(`Salario_Navidad_${anio}_Amalfi.pdf`);
    } finally {
      setPdfLoading(false);
    }
  }

  const sortedEmps = [...employees].sort((a,b) => a.name.localeCompare(b.name));

  return (
    <div style={{maxWidth:900,margin:'0 auto',padding:24}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <h2 style={{fontFamily:'Montserrat',color:'#003366',marginBottom:4}}>🎄 Salario de Navidad {anio}</h2>
          <p style={{fontSize:13,color:'#5A7090'}}>
            Art. 219 del Código de Trabajo · Fórmula: (Suma salarios ordinarios del año) ÷ 12 · Pago límite: <strong>20 de Diciembre</strong>
          </p>
        </div>
        <button onClick={descargarPDF} disabled={pdfLoading}
          style={{background:'#003366',color:'white',border:'none',borderRadius:10,
            padding:'10px 20px',fontWeight:700,cursor:'pointer',fontSize:13,whiteSpace:'nowrap'}}>
          {pdfLoading ? '⏳ Generando...' : '⬇️ Descargar Planilla PDF'}
        </button>
      </div>

      {/* Info card */}
      <div style={{background:'#FFF8E7',border:'1px solid #F0D080',borderRadius:12,
        padding:'12px 16px',marginBottom:20,fontSize:13,color:'#7A5800',lineHeight:1.6}}>
